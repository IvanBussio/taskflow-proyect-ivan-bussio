<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Inter,sans-serif;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
}

/* APP */
.container{padding:40px;}

.app{
  max-width:1200px;
  margin:auto;
  background:rgba(30,41,59,0.7);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:30px;
  position:relative;
}

/* BOTONES DENTRO DEL CUADRANTE */
.top-buttons{
  position:absolute;
  top:15px;
  left:15px;
  right:15px;
  display:flex;
  justify-content:space-between;
}

.top-buttons button{
  background:rgba(255,255,255,0.08);
  border:none;
  color:#cbd5f5;
  padding:8px 10px;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.top-buttons button:hover{
  transform:scale(1.1);
}

/* HEADER */
h1{text-align:center;}
.subtitle{text-align:center;margin-bottom:20px;color:#94a3b8;}

/* STATS */
.stats{display:flex;gap:10px;margin-bottom:20px;}
.stat{flex:1;padding:15px;border-radius:10px;text-align:center;}

.total{background:rgba(59,130,246,0.2);}
.done{background:rgba(34,197,94,0.2);}
.pending{background:rgba(244,114,182,0.2);}

/* INPUT */
.input-group{display:flex;gap:10px;margin-bottom:20px;}
input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#334155;
  color:white;
}

button{
  cursor:pointer;
}

/* TASK */
.task{
  display:flex;
  justify-content:space-between;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}

/* WELCOME */
.welcome{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  padding:12px 20px;
  border-radius:10px;
  display:none;
}

</style>
</head>

<body>

<div class="container">
<div class="app">

<!-- BOTONES BIEN POSICIONADOS -->
<div class="top-buttons">
  <button onclick="openInfo()">ℹ️</button>
  <button onclick="toggleMode()" id="modeIcon">🌙</button>
</div>

<h1>TaskFlow</h1>
<p class="subtitle">Organiza tu día 🚀</p>

<div class="stats">
<div class="stat total">TOTAL <span id="total">0</span></div>
<div class="stat done">OK <span id="done">0</span></div>
<div class="stat pending">PEND <span id="pending">0</span></div>
</div>

<div class="input-group">
<input id="taskInput" placeholder="Agregar tarea...">
<button onclick="addTask()">+</button>
</div>

<div id="taskList"></div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="infoModal">
  <div class="modal-content">
    <h3>TaskFlow</h3>
    <p>Organizá tu día fácil 🚀</p>
    <button onclick="closeInfo()">Cerrar</button>
  </div>
</div>

<!-- WELCOME -->
<div class="welcome" id="welcomeMsg">Bienvenido 👋</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

/* ADD */
function addTask(){
if(!taskInput.value.trim())return;
tasks.push({text:taskInput.value,completed:false});
taskInput.value="";
save();
}

/* RENDER */
function renderTasks(){
taskList.innerHTML="";
tasks.forEach((t,i)=>{
taskList.innerHTML+=`
<div class="task">
<span onclick="toggleTask(${i})">${t.completed?"✔️":""} ${t.text}</span>
<button onclick="deleteTask(${i})">✖</button>
</div>`;
});
updateStats();
}

/* FUNCIONES */
function toggleTask(i){tasks[i].completed=!tasks[i].completed;save();}
function deleteTask(i){tasks.splice(i,1);save();}

/* STATS */
function updateStats(){
total.textContent=tasks.length;
done.textContent=tasks.filter(t=>t.completed).length;
pending.textContent=tasks.filter(t=>!t.completed).length;
}

/* SAVE */
function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
renderTasks();
}

/* INFO */
function openInfo(){infoModal.style.display="flex";}
function closeInfo(){infoModal.style.display="none";}

/* MODE */
function toggleMode(){
document.body.classList.toggle("light");
}

/* WELCOME FIX REAL */
window.addEventListener("load",()=>{
if(!localStorage.getItem("visited")){
welcomeMsg.style.display="block";
setTimeout(()=>{
welcomeMsg.style.display="none";
},3000);
localStorage.setItem("visited","true");
}
});

renderTasks();

</script>

</body>
</html>
