<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow PRO</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
margin:0;
font-family:sans-serif;
color:white;
transition:all .4s ease;
overflow-x:hidden;
}

/* 🌙 MODO OSCURO (DEFAULT) */
body{
background:linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);
background-size:300% 300%;
animation:bgmove 12s ease infinite;
}

/* ☀️ MODO CLARO */
body.light{
background:linear-gradient(135deg,#d1fae5,#bbf7d0,#a7f3d0);
color:#022c22;
}

/* ANIMACIÓN FONDO */
@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* ✏️ LÍNEAS ANIMADAS */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.line{
position:absolute;
width:2px;
height:200%;
background:rgba(255,255,255,0.08);
animation:draw 6s linear infinite;
}

@keyframes draw{
0%{transform:translateY(-100%)}
100%{transform:translateY(100%)}
}

/* TARJETAS */
.card{
background:rgba(30,41,59,0.6);
padding:25px;
border-radius:16px;
backdrop-filter:blur(12px);
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

body.light .card{
background:white;
}

/* INPUT */
input{
background:#020617;
border:1px solid #334155;
color:white;
}

body.light input{
background:white;
color:#022c22;
border:1px solid #86efac;
}

/* BOTONES */
.btn{
background:#334155;
padding:8px 14px;
border-radius:10px;
transition:.2s;
}

.btn:hover{
transform:scale(1.05);
background:#475569;
}

body.light .btn{
background:#4ade80;
color:#022c22;
}

/* TAREAS */
.task{
background:#020617;
padding:14px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
animation:fade .3s ease;
}

body.light .task{
background:#bbf7d0;
color:#022c22;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* CHIP */
.chip{
background:#22c55e;
padding:4px 8px;
border-radius:20px;
font-size:12px;
margin-left:6px;
}

body.light .chip{
background:#16a34a;
color:white;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:flex;
align-items:center;
justify-content:center;
}

.modal-box{
background:#020617;
padding:40px;
border-radius:20px;
max-width:400px;
text-align:center;
}

body.light .modal-box{
background:white;
color:#022c22;
}

</style>
</head>

<body>

<!-- FONDO LÍNEAS -->
<div class="bg">
<div class="line" style="left:15%"></div>
<div class="line" style="left:35%"></div>
<div class="line" style="left:55%"></div>
<div class="line" style="left:75%"></div>
<div class="line" style="left:90%"></div>
</div>

<!-- HEADER -->
<div class="flex justify-between items-center p-6">

<div class="flex gap-2">
<button onclick="openModal()" class="btn">ℹ</button>
<button onclick="toggleTheme()" class="btn">🌙</button>
</div>

<h1 class="text-4xl font-semibold">TaskFlow</h1>

</div>

<div class="max-w-5xl mx-auto p-6">

<!-- INPUT -->
<div class="card mb-6">

<input id="taskInput" placeholder="Nueva tarea..." class="w-full p-2 rounded mb-2">
<input id="categoryInput" placeholder="Categoría..." class="w-full p-2 rounded mb-3">

<div class="flex gap-2">
<button onclick="addTask()" class="btn">Añadir</button>
<button onclick="completeAll()" class="btn">Completar</button>
<button onclick="deleteCompleted()" class="btn">Borrar</button>
</div>

</div>

<!-- LISTA -->
<div class="card">

<input id="search" placeholder="Buscar..." class="w-full p-2 rounded mb-3">

<div id="taskList"></div>

</div>

</div>

<!-- MODAL -->
<div id="modal" style="display:none;" class="modal">

<div class="modal-box">

<h2 class="text-2xl mb-3">Bienvenido a TaskFlow</h2>

<p class="mb-4">
Organiza tu día con estilo.  
Modo claro verde pastel 🌿  
Modo oscuro galáctico 🌌
</p>

<button onclick="closeModal()" class="btn">Empezar</button>

</div>

</div>

<script>

let tasks = []
try{
tasks = JSON.parse(localStorage.getItem("tasks")) || []
}catch{
tasks = []
}

let dragIndex = null

function save(){
localStorage.setItem("tasks", JSON.stringify(tasks))
}

function addTask(){
const text = document.getElementById("taskInput").value
const cat = document.getElementById("categoryInput").value
if(!text) return

tasks.push({text,cat,done:false})

document.getElementById("taskInput").value=""
document.getElementById("categoryInput").value=""

save()
render()
}

function render(){
const list = document.getElementById("taskList")
list.innerHTML=""

const search = document.getElementById("search").value.toLowerCase()

tasks.forEach((t,i)=>{

if(search && !t.text.toLowerCase().includes(search)) return

const div = document.createElement("div")
div.className="task"
div.draggable=true

div.ondragstart=()=>dragIndex=i
div.ondragover=(e)=>e.preventDefault()
div.ondrop=()=>{
const moved = tasks.splice(dragIndex,1)[0]
tasks.splice(i,0,moved)
save()
render()
}

div.innerHTML=`
<span style="${t.done?'text-decoration:line-through':''}">
${t.text}
${t.cat?`<span class="chip">${t.cat}</span>`:""}
</span>

<div>
<button onclick="toggle(${i})">✔</button>
<button onclick="removeTask(${i})">❌</button>
</div>
`

list.appendChild(div)
})
}

function toggle(i){
tasks[i].done=!tasks[i].done
save()
render()
}

function removeTask(i){
tasks.splice(i,1)
save()
render()
}

function completeAll(){
tasks.forEach(t=>t.done=true)
save()
render()
}

function deleteCompleted(){
tasks=tasks.filter(t=>!t.done)
save()
render()
}

/* 🌙 CAMBIO DE TEMA */
function toggleTheme(){
document.body.classList.toggle("light")
}

/* MODAL */
function openModal(){
document.getElementById("modal").style.display="flex"
}

function closeModal(){
document.getElementById("modal").style.display="none"
localStorage.setItem("visited","true")
}

if(!localStorage.getItem("visited")){
openModal()
}

document.getElementById("search").addEventListener("input",render)

render()

</script>

</body>
</html>
