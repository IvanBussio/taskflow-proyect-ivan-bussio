<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = { darkMode: "class" }
</script>

<style>

body{
font-family:"Inter",sans-serif;
transition:background 0.5s ease,color 0.5s ease;
}

/* AURORA */

.aurora{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
overflow:hidden;
}

.aurora div{
position:absolute;
width:120%;
height:120%;
filter:blur(120px);
animation:auroraMove 22s infinite alternate ease-in-out;
}

body.light .aurora div:nth-child(1){
background:radial-gradient(circle,#ffb6c1,transparent);
}

body.light .aurora div:nth-child(2){
background:radial-gradient(circle,#87cefa,transparent);
}

body.light .aurora div:nth-child(3){
background:radial-gradient(circle,#c084fc,transparent);
}

body.dark .aurora div:nth-child(1){
background:radial-gradient(circle,#00ffc8,transparent);
}

body.dark .aurora div:nth-child(2){
background:radial-gradient(circle,#00aaff,transparent);
}

body.dark .aurora div:nth-child(3){
background:radial-gradient(circle,#7c3aed,transparent);
}

@keyframes auroraMove{
0%{transform:translate(-20%,-20%) scale(1);}
50%{transform:translate(20%,10%) scale(1.2);}
100%{transform:translate(-10%,20%) scale(1);}
}

/* PARTICULAS */

.particles{
position:fixed;
width:100%;
height:100%;
z-index:-1;
background-image:
radial-gradient(2px 2px at 20% 30%,white,transparent),
radial-gradient(2px 2px at 70% 80%,white,transparent),
radial-gradient(2px 2px at 40% 60%,white,transparent);
opacity:0.15;
}

/* TARJETAS */

.card{
padding:24px;
border-radius:16px;
backdrop-filter:blur(16px);
transition:0.3s;
}

body.light .card{
background:rgba(255,255,255,0.85);
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

body.dark .card{
background:rgba(20,30,40,0.65);
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.completed{
text-decoration:line-through;
color:#ef4444;
}

</style>

</head>

<body class="light flex flex-col items-center p-10">

<div class="aurora">
<div></div>
<div></div>
<div></div>
</div>

<div class="particles"></div>

<div id="themeToggle" class="fixed top-6 right-6 text-2xl cursor-pointer">
🌙
</div>

<h1 class="text-4xl font-bold mb-8">TaskFlow</h1>

<div class="w-full max-w-xl space-y-6">

<div class="card">

<input id="taskInput" placeholder="Nueva tarea..." class="w-full border rounded p-2 mb-3">

<button id="addTaskBtn" class="bg-blue-500 text-white px-4 py-2 rounded">
Añadir tarea
</button>

</div>

<div class="card">

<div class="flex justify-between items-center mb-3">

<input id="searchInput" placeholder="Buscar tarea..." class="border rounded p-2 w-2/3">

<button id="sortBtn" class="bg-indigo-500 text-white px-3 py-1 rounded">
Ordenar
</button>

</div>

<div class="flex gap-2 mb-3">

<button id="filterAll" class="bg-gray-300 px-2 py-1 rounded">Todas</button>
<button id="filterPending" class="bg-yellow-400 px-2 py-1 rounded">Pendientes</button>
<button id="filterDone" class="bg-green-400 px-2 py-1 rounded">Completadas</button>

</div>

<div class="text-sm mb-2" id="taskStats"></div>

<ul id="taskList" class="space-y-2"></ul>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
