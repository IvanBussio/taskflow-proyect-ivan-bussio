<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
  min-height:100vh;
}

/* FONDO */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background: radial-gradient(circle,rgba(59,130,246,0.15),transparent);
  animation:moveBg 20s linear infinite;
  z-index:-1;
}

@keyframes moveBg{
  0%{transform:translate(0,0);}
  50%{transform:translate(-200px,-200px);}
  100%{transform:translate(0,0);}
}

/* LIGHT */
body.light{
  background: linear-gradient(135deg,#e0f2ff,#bae6fd);
  color:#0f172a;
}

body.light .app{
  background:rgba(255,255,255,0.9);
}

/* CONTAINER */
.container{
  padding:40px;
  position:relative;
}

.app{
  max-width:1400px;
  margin:auto;
  background:rgba(30,41,59,0.6);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:40px;
}

/* BOTONES ARRIBA */
.top-buttons{
  position:absolute;
  top:20px;
  left:0;
  right:0;
  max-width:1400px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  padding:0 10px;
}

.top-buttons button{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  color:#cbd5f5;
  padding:10px;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}

.top-buttons button:hover{
  transform:scale(1.1);
  background:rgba(255,255,255,0.15);
}

/* HEADER */
h1{text-align:center;font-size:2.5rem;}
.subtitle{text-align:center;margin-bottom:30px;color:#94a3b8;}

/* STATS */
.stats{display:flex;gap:20px;margin-bottom:20px;}

.stat{
  flex:1;
  padding:20px;
  border-radius:15px;
  text-align:center;
  font-weight:bold;
}

.total{background:rgba(59,130,246,0.15);color:#93c5fd;}
.done{background:rgba(34,197,94,0.15);color:#86efac;}
.pending{background:rgba(244,114,182,0.15);color:#f9a8d4;}

/* INPUT */
.input-group{display:flex;gap:10px;margin-bottom:20px;}

.input-group input{
  flex:1;
  padding:15px;
  border-radius:12px;
  border:none;
  background:#334155;
  color:white;
}

.input-group button{
  padding:0 20px;
  border-radius:12px;
  border:none;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

/* FILTERS */
.filters{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.filters input{
  padding:10px;
  border-radius:10px;
  border:none;
  background:#334155;
  color:white;
}

.filters button{
  background:none;
  border:none;
  color:#60a5fa;
  cursor:pointer;
}

.delete{color:#ef4444;}

/* TASK */
.task{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.task-content{
  display:flex;
  align-items:center;
  gap:10px;
  flex:1;
  cursor:pointer;
}

.task.completed span{
  text-decoration:line-through;
  opacity:0.5;
}

.delete-btn{
  background:none;
  border:none;
  color:#64748b;
  cursor:pointer;
}

.delete-btn:hover{
  color:#ef4444;
}

.category-select{
  background:#334155;
  color:white;
  border:none;
  padding:5px 10px;
  border-radius:8px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#1e293b;
  padding:30px;
  border-radius:15px;
}

/* WELCOME */
.welcome{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  padding:15px 25px;
  border-radius:12px;
  display:none;
}

/* MOBILE */
@media(max-width:768px){

.container{padding:15px;}
.app{padding:20px;}

.stats{flex-direction:column;}

.input-group{flex-direction:column;}

.filters{flex-direction:column;gap:10px;}

.task{flex-direction:column;align-items:flex-start;}

.category-select{width:100%;}
}

</style>
</head>

<body>

<div class="top-buttons">
  <button onclick="openInfo()">ℹ️</button>
  <button onclick="toggleMode()" id="modeIcon">🌙</button>
</div>

<div class="container">
<div class="app">

<h1>TaskFlow</h1>
<p class="subtitle">Organiza tu día 🚀</p>

<div class="stats">
<div class="stat total">TOTAL<br><span id="total">0</span></div>
<div class="stat done">COMPLETADAS<br><span id="done">0</span></div>
<div class="stat pending">PENDIENTES<br><span id="pending">0</span></div>
</div>

<div class="input-group">
<input id="taskInput" placeholder="Agregar tarea...">
<button onclick="addTask()">+</button>
</div>

<div class="filters">
<input id="search" placeholder="Buscar..." oninput="renderTasks()">
<button onclick="sortTasks()">Ordenar</button>
<button class="delete" onclick="deleteCompleted()">Eliminar completadas</button>
</div>

<div id="taskList"></div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="infoModal">
  <div class="modal-content">
    <h2>Info</h2>
    <p>TaskFlow te ayuda a organizar tu día 🚀</p>
    <br>
    <button onclick="closeInfo()">Cerrar</button>
  </div>
</div>

<div class="welcome" id="welcomeMsg">Bienvenido 👋</div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

function addTask(){
if(!taskInput.value.trim())return;
tasks.push({text:taskInput.value,completed:false,category:"📌 General"});
taskInput.value="";
save();
}

function renderTasks(){
taskList.innerHTML="";
tasks.forEach((t,i)=>{
taskList.innerHTML+=`
<div class="task">
<div class="task-content" onclick="toggleTask(${i})">
<input type="checkbox" ${t.completed?"checked":""}>
<span>${t.text}</span>
<select class="category-select" onchange="changeCategory(${i},this.value)">
<option>📌 General</option>
<option>🛒 Compras</option>
<option>📚 Estudio</option>
</select>
</div>
<button class="delete-btn" onclick="deleteTask(${i})">✖</button>
</div>`;
});
updateStats();
}

function toggleTask(i){tasks[i].completed=!tasks[i].completed;save();}
function deleteTask(i){tasks.splice(i,1);save();}
function deleteCompleted(){tasks=tasks.filter(t=>!t.completed);save();}
function sortTasks(){tasks.sort((a,b)=>a.text.localeCompare(b.text));save();}
function changeCategory(i,val){tasks[i].category=val;save();}

function updateStats(){
total.textContent=tasks.length;
done.textContent=tasks.filter(t=>t.completed).length;
pending.textContent=tasks.filter(t=>!t.completed).length;
}

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
renderTasks();
}

function toggleMode(){document.body.classList.toggle("light");}

function openInfo(){infoModal.style.display="flex";}
function closeInfo(){infoModal.style.display="none";}

window.onload=()=>{
if(!localStorage.getItem("visited")){
welcomeMsg.style.display="block";
setTimeout(()=>welcomeMsg.style.display="none",3000);
localStorage.setItem("visited","true");
}
}

renderTasks();

</script>

</body>
</html>
