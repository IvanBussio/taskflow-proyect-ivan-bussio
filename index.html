<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Inter,sans-serif;
  background:#0b1220;
  color:#e5e7eb;
  transition:0.3s;
}

/* LIGHT MODE (BIEN HECHO) */
body.light{
  background:#f1f5f9;
  color:#0f172a;
}

.container{padding:30px;}

.app{
  max-width:1200px;
  margin:auto;
  background:#111827;
  padding:30px;
  border-radius:16px;
}

body.light .app{
  background:#ffffff;
}

/* BOTONES */
.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
}

button{
  cursor:pointer;
  border:none;
  border-radius:8px;
  padding:8px 12px;
}

/* HEADER */
h1{text-align:center;margin-bottom:10px;}
.subtitle{text-align:center;margin-bottom:20px;opacity:0.6;}

/* INPUT */
.input-group{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#1f2937;
  color:white;
}

body.light input{
  background:#f1f5f9;
  color:#0f172a;
}

.add{
  background:#6366f1;
  color:white;
}

/* TASK */
.task{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#1f2937;
  margin-bottom:8px;
  border-radius:8px;
}

body.light .task{
  background:#f8fafc;
}

.task.completed span{
  text-decoration:line-through;
  opacity:0.5;
}

/* DELETE */
.delete{
  background:none;
  color:#ef4444;
}

/* SELECT */
select{
  background:#374151;
  color:white;
  border:none;
  border-radius:6px;
}

body.light select{
  background:#e2e8f0;
  color:#0f172a;
}

</style>
</head>

<body>

<div class="container">
<div class="app">

<div class="top">
<button onclick="toggleMode()">🌙</button>
<button onclick="openInfo()">ℹ️</button>
</div>

<h1>TaskFlow</h1>
<p class="subtitle">Organiza tu día</p>

<div class="input-group">
<input id="taskInput" placeholder="Agregar tarea...">
<button class="add" onclick="addTask()">+</button>
</div>

<div id="taskList"></div>

</div>
</div>

<!-- MODAL -->
<div id="infoModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;">
<div style="background:white;padding:20px;border-radius:10px;">
<h3>TaskFlow</h3>
<p>App para organizar tareas con IA básica.</p>
<button onclick="closeInfo()">Cerrar</button>
</div>
</div>

<script>

/* IA REAL SIMPLE */
function detectCategory(text){
text=text.toLowerCase();

if(text.includes("comprar")) return "Compras";
if(text.includes("estudiar")) return "Estudio";
if(text.includes("gym")) return "Gym";
if(text.includes("trabajo")) return "Trabajo";
if(text.includes("comer")) return "Comida";

return "General";
}

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function addTask(){
if(!taskInput.value.trim()) return;

const cat = detectCategory(taskInput.value);

tasks.push({
text:taskInput.value,
completed:false,
category:cat
});

taskInput.value="";
save();
}

/* IA EN TIEMPO REAL */
taskInput.addEventListener("input",()=>{
const cat=detectCategory(taskInput.value);
taskInput.placeholder="→ "+cat;
});

function render(){
taskList.innerHTML="";

tasks.forEach((t,i)=>{
taskList.innerHTML+=`
<div class="task ${t.completed?"completed":""}">
<span onclick="toggleTask(${i})">${t.text}</span>

<select onchange="changeCat(${i},this.value)">
<option ${t.category==="General"?"selected":""}>General</option>
<option ${t.category==="Compras"?"selected":""}>Compras</option>
<option ${t.category==="Estudio"?"selected":""}>Estudio</option>
<option ${t.category==="Trabajo"?"selected":""}>Trabajo</option>
<option ${t.category==="Gym"?"selected":""}>Gym</option>
<option ${t.category==="Comida"?"selected":""}>Comida</option>
</select>

<button class="delete" onclick="deleteTask(${i})">✖</button>
</div>`;
});
}

function toggleTask(i){tasks[i].completed=!tasks[i].completed;save();}
function deleteTask(i){tasks.splice(i,1);save();}
function changeCat(i,val){tasks[i].category=val;save();}

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
render();
}

/* MODE */
function toggleMode(){
document.body.classList.toggle("light");
}

/* INFO */
function openInfo(){
infoModal.style.display="flex";
}
function closeInfo(){
infoModal.style.display="none";
}

render();

</script>

</body>
</html>
