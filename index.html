<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body.light{
background:linear-gradient(270deg,#74ebd5,#ACB6E5,#74ebd5);
background-size:600% 600%;
animation:bg 18s ease infinite;
}

body.dark{
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
background-size:600% 600%;
animation:bg 18s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

</style>

</head>

<body class="light min-h-screen flex flex-col items-center p-10 transition-all">

<header class="w-full max-w-3xl flex justify-between items-center mb-8">

<h1 class="text-3xl font-bold">TaskFlow</h1>

<div id="themeToggle" class="cursor-pointer text-2xl">🌙</div>

</header>

<div class="w-full max-w-3xl space-y-6">

<div class="bg-white/70 backdrop-blur-lg p-6 rounded-xl shadow-lg">

<h2 class="text-xl font-semibold mb-4">Crear nueva tarea</h2>

<input
id="taskTitle"
placeholder="Título de la tarea"
class="w-full p-2 rounded-lg border border-gray-300 mb-3"
/>

<button
onclick="addTask()"
class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:scale-105 transition"
>
Añadir tarea
</button>

</div>

<div class="bg-white/70 backdrop-blur-lg p-6 rounded-xl shadow-lg">

<h2 class="text-xl font-semibold mb-4">Tus tareas</h2>

<input
id="searchTask"
placeholder="Buscar tareas..."
class="w-full p-2 rounded-lg border border-gray-300 mb-4"
/>

<div class="flex gap-2 mb-4 flex-wrap">

<button onclick="filterTasks('all')" class="px-3 py-1 bg-gray-200 rounded-lg">
Todas
</button>

<button onclick="filterTasks('pending')" class="px-3 py-1 bg-gray-200 rounded-lg">
Pendientes
</button>

<button onclick="filterTasks('completed')" class="px-3 py-1 bg-gray-200 rounded-lg">
Completadas
</button>

<button onclick="sortTasks()" class="px-3 py-1 bg-indigo-500 text-white rounded-lg">
Orden A-Z
</button>

</div>

<div id="taskList" class="space-y-2"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
