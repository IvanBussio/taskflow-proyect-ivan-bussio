<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      padding: 40px 60px;
    }

    .app {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 2.5rem;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 30px;
    }

    /* DASHBOARD */
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 25px;
    }

    .stat {
      flex: 1;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      font-weight: bold;
    }

    .total { background: #3b82f6; }
    .done { background: #22c55e; }
    .pending { background: #ec4899; }

    /* INPUT */
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .input-group input {
      flex: 1;
      padding: 15px;
      border-radius: 12px;
      border: none;
      background: #334155;
      color: white;
      font-size: 1rem;
    }

    .input-group input:focus {
      outline: 2px solid #22c55e;
    }

    .input-group button {
      padding: 0 20px;
      border-radius: 12px;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 1.3rem;
      cursor: pointer;
    }

    /* FILTROS */
    .filters {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .filters input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #334155;
      color: white;
    }

    .filters button {
      background: none;
      border: none;
      color: #60a5fa;
      cursor: pointer;
    }

    .delete {
      color: #ef4444;
    }

    /* TAREAS */
    .task {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      animation: fadeIn 0.3s ease;
    }

    .task span {
      flex: 1;
      margin-left: 10px;
    }

    .task.completed span {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .task button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      margin-left: 5px;
    }

    /* ANIMACIÓN */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* FOOTER */
    footer {
      text-align: center;
      margin-top: 30px;
      color: #94a3b8;
    }

    footer a {
      color: #60a5fa;
      text-decoration: none;
    }

  </style>
</head>

<body>

<div class="container">
  <div class="app">

    <h1>TaskFlow</h1>
    <p class="subtitle">Organiza tu día 🚀</p>

    <!-- DASHBOARD -->
    <div class="stats">
      <div class="stat total">TOTAL<br><span id="total">0</span></div>
      <div class="stat done">COMPLETADAS<br><span id="done">0</span></div>
      <div class="stat pending">PENDIENTES<br><span id="pending">0</span></div>
    </div>

    <!-- INPUT -->
    <div class="input-group">
      <input id="taskInput" type="text" placeholder="Agregar tarea...">
      <button onclick="addTask()">+</button>
    </div>

    <!-- FILTROS -->
    <div class="filters">
      <input id="search" type="text" placeholder="Buscar..." oninput="renderTasks()">
      <button onclick="sortTasks()">Ordenar</button>
      <button class="delete" onclick="deleteCompleted()">Eliminar completadas</button>
    </div>

    <!-- LISTA -->
    <div id="taskList"></div>

    <!-- FOOTER -->
    <footer>
      © 2026 TaskFlow · Project developed by Ivan Bussio (FCT) — 
      <a href="https://corner-estudios.com" target="_blank">Corner Studios</a>
    </footer>

  </div>
</div>

<script>

let tasks = [];

function addTask() {
  const input = document.getElementById("taskInput");
  if (!input.value.trim()) return;

  tasks.push({
    text: input.value,
    completed: false
  });

  input.value = "";
  renderTasks();
}

function renderTasks() {
  const list = document.getElementById("taskList");
  const search = document.getElementById("search").value.toLowerCase();

  list.innerHTML = "";

  tasks
    .filter(t => t.text.toLowerCase().includes(search))
    .forEach((task, index) => {

      const div = document.createElement("div");
      div.className = "task" + (task.completed ? " completed" : "");

      div.innerHTML = `
        <input type="checkbox" ${task.completed ? "checked" : ""} onclick="toggleTask(${index})">
        <span>${task.text}</span>
        <button onclick="deleteTask(${index})">❌</button>
      `;

      list.appendChild(div);
    });

  updateStats();
}

function toggleTask(i) {
  tasks[i].completed = !tasks[i].completed;
  renderTasks();
}

function deleteTask(i) {
  tasks.splice(i, 1);
  renderTasks();
}

function deleteCompleted() {
  tasks = tasks.filter(t => !t.completed);
  renderTasks();
}

function sortTasks() {
  tasks.sort((a, b) => a.text.localeCompare(b.text));
  renderTasks();
}

function updateStats() {
  document.getElementById("total").textContent = tasks.length;
  document.getElementById("done").textContent = tasks.filter(t => t.completed).length;
  document.getElementById("pending").textContent = tasks.filter(t => !t.completed).length;
}

document.getElementById("taskInput").addEventListener("keypress", function(e){
  if(e.key === "Enter") addTask();
});

</script>

</body>
</html>
