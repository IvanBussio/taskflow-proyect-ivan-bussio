<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  min-height: 100vh;
  transition: 0.3s;
}

/* FONDO ANIMADO */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(59,130,246,0.15), transparent);
  animation: moveBg 20s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(-200px,-200px); }
  100% { transform: translate(0,0); }
}

/* LIGHT MODE */
body.light {
  background: linear-gradient(135deg, #c7f0ff, #a5e3ff);
  color: #0f172a;
}

body.light .app {
  background: rgba(255,255,255,0.6);
}

body.light input {
  background: #e2f3ff;
  color: black;
}

/* CONTAINER */
.container {
  width: 100%;
  padding: 40px;
}

/* APP */
.app {
  max-width: 1200px;
  margin: auto;
  background: rgba(30, 41, 59, 0.6);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 40px;
}

/* HEADER */
h1 {
  text-align: center;
  font-size: 2.5rem;
}

.subtitle {
  text-align: center;
  margin-bottom: 30px;
  color: #94a3b8;
}

/* DASHBOARD */
.stats {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.stat {
  flex: 1;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

.total { background: #3b82f6; }
.done { background: #22c55e; }
.pending { background: #ec4899; }

/* INPUT */
.input-group {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.input-group input {
  flex: 1;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: #334155;
  color: white;
}

.input-group button {
  padding: 0 20px;
  border-radius: 12px;
  border: none;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

/* FILTERS */
.filters {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.filters input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #334155;
  color: white;
}

.filters button {
  background: none;
  border: none;
  color: #60a5fa;
  cursor: pointer;
}

.delete {
  color: #ef4444;
}

/* TASK */
.task {
  display: flex;
  align-items: center;
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  animation: fade 0.3s;
}

.task span {
  flex: 1;
  margin-left: 10px;
}

.task.completed span {
  text-decoration: line-through;
  opacity: 0.5;
}

.category {
  background: #475569;
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 0.8rem;
  margin-right: 10px;
}

/* ANIMACIÓN */
@keyframes fade {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* FOOTER */
footer {
  text-align: center;
  margin-top: 20px;
  color: #94a3b8;
}

/* BOTÓN MODO */
.mode-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  background: none;
  border: none;
  font-size: 1.2rem;
  cursor: pointer;
}

</style>
</head>

<body>

<button class="mode-btn" onclick="toggleMode()">🌙</button>

<div class="container">
  <div class="app">

    <h1>TaskFlow</h1>
    <p class="subtitle">Organiza tu día 🚀</p>

    <div class="stats">
      <div class="stat total">TOTAL<br><span id="total">0</span></div>
      <div class="stat done">COMPLETADAS<br><span id="done">0</span></div>
      <div class="stat pending">PENDIENTES<br><span id="pending">0</span></div>
    </div>

    <div class="input-group">
      <input id="taskInput" placeholder="Agregar tarea...">
      <button onclick="addTask()">+</button>
    </div>

    <div class="filters">
      <input id="search" placeholder="Buscar..." oninput="renderTasks()">
      <button onclick="sortTasks()">Ordenar</button>
      <button class="delete" onclick="deleteCompleted()">Eliminar completadas</button>
    </div>

    <div id="taskList"></div>

    <footer>
      © 2026 TaskFlow · Project developed by Ivan Bussio (FCT) — Corner Studios
    </footer>

  </div>
</div>

<script>

// ESTADO
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let darkMode = true;

// IA CATEGORÍAS
function getCategory(text) {
  text = text.toLowerCase();
  if (text.includes("comprar")) return "🛒 Compras";
  if (text.includes("gym") || text.includes("entreno")) return "🏋️ Fitness";
  if (text.includes("estudiar")) return "📚 Estudio";
  if (text.includes("trabajo")) return "💼 Trabajo";
  return "📌 General";
}

// ADD
function addTask() {
  const input = document.getElementById("taskInput");
  if (!input.value.trim()) return;

  tasks.push({
    text: input.value,
    completed: false,
    category: getCategory(input.value)
  });

  input.value = "";
  save();
}

// RENDER
function renderTasks() {
  const list = document.getElementById("taskList");
  const search = document.getElementById("search").value.toLowerCase();

  list.innerHTML = "";

  tasks
    .filter(t => t.text.toLowerCase().includes(search))
    .forEach((task, i) => {

      const div = document.createElement("div");
      div.className = "task" + (task.completed ? " completed" : "");

      div.innerHTML = `
        <input type="checkbox" ${task.completed ? "checked" : ""} onclick="toggleTask(${i})">
        <span>${task.text}</span>
        <span class="category">${task.category}</span>
        <button onclick="deleteTask(${i})">❌</button>
      `;

      list.appendChild(div);
    });

  updateStats();
}

// FUNCIONES
function toggleTask(i) { tasks[i].completed = !tasks[i].completed; save(); }
function deleteTask(i) { tasks.splice(i, 1); save(); }
function deleteCompleted() { tasks = tasks.filter(t => !t.completed); save(); }
function sortTasks() { tasks.sort((a,b)=>a.text.localeCompare(b.text)); save(); }

// STATS
function updateStats() {
  total.textContent = tasks.length;
  done.textContent = tasks.filter(t=>t.completed).length;
  pending.textContent = tasks.filter(t=>!t.completed).length;
}

// GUARDAR
function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
  renderTasks();
}

// MODO
function toggleMode() {
  document.body.classList.toggle("light");
}

// ENTER
taskInput.addEventListener("keypress", e=>{
  if(e.key==="Enter") addTask();
});

// INIT
renderTasks();

</script>

</body>
</html>
