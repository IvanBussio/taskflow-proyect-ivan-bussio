<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:sans-serif;
margin:0;
}

/* FONDO ANIMADO */
.bg{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
background:#f3f4f6;
overflow:hidden;
}

.line{
position:absolute;
width:2px;
height:200%;
background:rgba(0,0,0,0.1);
animation:move 5s linear infinite;
}

@keyframes move{
0%{transform:translateY(-100%)}
100%{transform:translateY(100%)}
}
</style>

</head>

<body>

<div class="bg">
<div class="line" style="left:20%"></div>
<div class="line" style="left:50%"></div>
<div class="line" style="left:80%"></div>
</div>

<div class="p-10 max-w-4xl mx-auto">

<h1 class="text-4xl mb-6">TaskFlow</h1>

<input id="taskInput" class="border p-2 w-full mb-3" placeholder="Tarea...">

<button onclick="addTask()" class="bg-blue-500 text-white px-4 py-2 mb-4">
Añadir
</button>

<div id="taskList"></div>

</div>

<script>

// 🔥 SIN localStorage (para evitar errores)
let tasks = []

function addTask(){
const input = document.getElementById("taskInput")

if(!input.value) return

tasks.push(input.value)
input.value=""

render()
}

function render(){
const list = document.getElementById("taskList")
list.innerHTML=""

tasks.forEach((t,i)=>{
const div = document.createElement("div")
div.className="p-3 bg-white mb-2 rounded shadow"

div.innerHTML = t

list.appendChild(div)
})
}

</script>

</body>
</html>
