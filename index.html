<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
button{all:unset;cursor:pointer;}
:root{--violet:#7c3aed;}

body{font-family:Inter;transition:0.3s;}
body.dark{background:#0a0a0f;color:#e5e7eb;}
body.light{background:linear-gradient(135deg,#f5f3ff,#eef2ff);color:#1e293b;}

/* fondo */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:
radial-gradient(circle at 20% 20%, rgba(124,58,237,0.2), transparent 40%),
radial-gradient(circle at 80% 80%, rgba(124,58,237,0.2), transparent 40%);
animation:moveBg 20s linear infinite;
z-index:-1;
}
@keyframes moveBg{
0%{transform:translate(0,0);}
50%{transform:translate(-200px,-200px);}
100%{transform:translate(0,0);}
}

/* layout principal */
.app{
max-width:1800px;
margin:auto;
padding:20px 40px;
display:flex;
flex-direction:column;
min-height:100vh;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

h1{font-size:2.5rem;border-bottom:3px solid var(--violet);}

/* GRID DESKTOP */
.main{
display:grid;
grid-template-columns: 400px 1fr;
gap:30px;
}

/* panel izquierdo */
.panel{
display:flex;
flex-direction:column;
gap:15px;
}

/* botones */
.btn{
padding:10px 14px;
border-radius:12px;
background:rgba(124,58,237,0.2);
border:1px solid rgba(124,58,237,0.4);
transition:0.2s;
text-align:center;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(124,58,237,0.4);}

/* inputs */
input, select{
padding:14px;
border-radius:12px;
border:1px solid transparent;
background:rgba(20,20,30,0.8);
color:inherit;
appearance:none;
}

select{
padding-right:35px;
background-image:url("data:image/svg+xml;utf8,<svg fill='%237c3aed' height='20' viewBox='0 0 20 20' width='20'><path d='M5 7l5 5 5-5z'/></svg>");
background-repeat:no-repeat;
background-position:right 10px center;
}

input:focus, select:focus{
outline:none;
border:1px solid var(--violet);
box-shadow:0 0 0 2px rgba(124,58,237,0.3);
}

/* tareas */
.task{
padding:14px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
background:rgba(20,20,30,0.6);
}

.task > div{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.task[data-priority="Alta"]{border-left:4px solid #ef4444;}
.task[data-priority="Media"]{border-left:4px solid #f59e0b;}
.task[data-priority="Baja"]{border-left:4px solid #22c55e;}

.task-text{max-width:400px;word-break:break-word;}

.badge{
padding:4px 10px;
border-radius:999px;
font-size:11px;
}

.priority-Alta{background:#ef4444;color:white;}
.priority-Media{background:#f59e0b;color:white;}
.priority-Baja{background:#22c55e;color:white;}

/* checkbox */
.checkbox input{display:none;}
.checkmark{
width:20px;height:20px;
border:2px solid var(--violet);
border-radius:6px;
display:flex;align-items:center;justify-content:center;
}
.checkbox input:checked + .checkmark{background:var(--violet);}
.checkmark::after{
content:"";
width:5px;height:10px;
border:solid white;border-width:0 2px 2px 0;
transform:rotate(45deg);
display:none;
}
.checkbox input:checked + .checkmark::after{display:block;}

/* delete */
.delete-btn{color:#9ca3af;transition:0.2s;}
.delete-btn:hover{color:#ef4444;transform:scale(1.2);}

/* MOBILE */
@media (max-width:768px){
.main{
grid-template-columns:1fr;
}
.task{
flex-direction:column;
align-items:flex-start;
}
.delete-btn{
align-self:flex-end;
}
}

.footer{text-align:center;margin-top:auto;opacity:0.6;}
</style>
</head>

<body class="dark">

<div class="app">

<div class="header">
<h1>TaskFlow</h1>
<div style="display:flex; gap:10px;">
<button class="btn" onclick="toggleMode()" id="modeBtn">🌙</button>
</div>
</div>

<div class="main">

<!-- PANEL -->
<div class="panel">

<input id="taskInput" placeholder="Añadir tarea...">

<select id="categorySelect">
<option value="">Categoría (Auto)</option>
<option>Compras</option>
<option>Trabajo</option>
<option>Estudio</option>
<option>Fitness</option>
</select>

<select id="prioritySelect">
<option value="">Prioridad (Auto)</option>
<option>Alta</option>
<option>Media</option>
<option>Baja</option>
</select>

<button class="btn" onclick="addTask()">Agregar tarea</button>

<button class="btn" onclick="selectAll()">Seleccionar todas</button>
<button class="btn" onclick="deleteCompleted()">Borrar completadas</button>
<button class="btn" onclick="sortTasks()">Ordenar</button>

</div>

<!-- LISTA -->
<div id="taskList"></div>

</div>

<footer class="footer">TaskFlow PRO</footer>

</div>

<script>

let tasks=[];

/* ADD */
function addTask(){
let text=taskInput.value.trim();
if(!text) return;

tasks.unshift({
id:Date.now(),
text,
completed:false,
category:categorySelect.value||"General",
priority:prioritySelect.value||"Media"
});

taskInput.value="";
render();
}

/* TOGGLE */
function toggle(id){
tasks=tasks.map(t=>t.id===id?{...t,completed:!t.completed}:t);
render();
}

/* DELETE */
function del(id){
tasks=tasks.filter(t=>t.id!==id);
render();
}

/* ACTIONS */
function selectAll(){tasks=tasks.map(t=>({...t,completed:true}));render();}
function deleteCompleted(){tasks=tasks.filter(t=>!t.completed);render();}
function sortTasks(){
const order={Alta:1,Media:2,Baja:3};
tasks.sort((a,b)=>order[a.priority]-order[b.priority]);
render();
}

/* RENDER */
function render(){
taskList.innerHTML="";

tasks.forEach(t=>{
const div=document.createElement("div");
div.className="task";
div.setAttribute("data-priority",t.priority);

div.innerHTML=`
<div>
<label class="checkbox">
<input type="checkbox" ${t.completed?"checked":""}>
<span class="checkmark"></span>
</label>

<span class="task-text">${t.text}</span>
<span class="badge">${t.category}</span>
<span class="badge priority-${t.priority}">${t.priority}</span>
</div>

<button class="delete-btn" onclick="del(${t.id})">✖</button>
`;

div.querySelector("input").onclick=()=>toggle(t.id);

taskList.appendChild(div);
});
}

function toggleMode(){
document.body.classList.toggle("light");
document.body.classList.toggle("dark");
}

render();

</script>

</body>
</html>
