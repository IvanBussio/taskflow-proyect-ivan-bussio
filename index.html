<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

/* ================= BASE ================= */
body{
margin:0;
font-family:'Poppins',sans-serif;
min-height:100vh;
background:linear-gradient(135deg,#f8fafc,#e2e8f0);
color:#111;
transition:background .25s,color .25s;
}

/* Dark mode */
body.light{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:#ffffff;
}

body.light{
background:#ffffff;
color:#111;
}

/* ================= HEADER ================= */
header{
position:relative;
text-align:center;
padding:40px 20px 10px;
}

header h1{margin:0;font-size:32px}
header p{margin-top:6px;opacity:.8}

.theme-toggle{
position:absolute;
top:20px;
right:20px;
border:none;
border-radius:8px;
padding:6px 10px;
font-size:18px;
cursor:pointer;
background:#222;
color:#fff;
}

body.light .theme-toggle{
background:#eee;
color:#111;
}

/* ================= DASHBOARD ================= */
.dashboard{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
margin-top:20px;
}

.card{
background:#ffffffaa;
padding:12px 18px;
border-radius:10px;
min-width:120px;
font-size:14px;
}

body.light .card{background:#1f2937;color:#fff}

.card strong{display:block;font-size:20px}

/* ================= PROGRESS ================= */
.progress-wrapper{width:260px;margin:15px auto}

.progress-bar{
height:8px;
background:#333;
border-radius:10px;
overflow:hidden;
}

body.light .progress-bar{background:#ddd}

.progress{
height:100%;
width:0%;
background:#2ecc71;
transition:width .3s;
}

/* ================= BOARD ================= */
.board{
display:flex;
justify-content:center;
gap:25px;
padding:30px;
flex-wrap:wrap;
}

.column{
background:#ffffffcc;
padding:18px;
border-radius:12px;
width:280px;
}

body.light .column{background:#1f2937}

.column h3{
text-align:center;
text-transform:uppercase;
font-size:14px;
margin-top:0;
letter-spacing:1px;
}

/* ================= TASKS ================= */
.tasks{min-height:60px;margin-bottom:10px}

.task{
background:#ffffff;
color:#222;
padding:8px 10px;
border-radius:8px;
margin-bottom:8px;
font-size:13px;
cursor:grab;
border-left:4px solid transparent;
}

.task.priority-high{border-left-color:#e74c3c}
.task.priority-medium{border-left-color:#f1c40f}
.task.priority-low{border-left-color:#2ecc71}

/* ================= ADD TASK ================= */
.add-task{display:flex;flex-direction:column;gap:6px}

.add-task input,
.task-options input,
.task-options select{
padding:6px;
border-radius:6px;
border:none;
font-size:12px;
}

.task-options{display:flex;gap:6px}

.add-btn{
padding:6px;
border:none;
border-radius:6px;
background:#3498db;
color:white;
cursor:pointer;
}

/* ================= BUTTONS ================= */
button.delete{
background:#e74c3c;
margin-top:6px;
width:100%;
padding:6px;
border:none;
border-radius:6px;
color:white;
}

button.complete{
background:#2ecc71;
margin-top:6px;
width:100%;
padding:6px;
border:none;
border-radius:6px;
color:white;
}

.clear-done{
margin-top:10px;
width:100%;
background:#e74c3c;
padding:8px;
border:none;
border-radius:6px;
color:white;
}

footer{
text-align:center;
padding:20px;
font-size:14px;
opacity:.7;
}
</style>
</head>

<body>

<header>
<h1>TaskFlow Pro</h1>
<p>Organize your work with a simple Kanban board</p>
<button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙</button>

<div class="dashboard">
<div class="card">Total Tasks<strong id="totalTasks">0</strong></div>
<div class="card">Completed<strong id="doneTasks">0</strong></div>
<div class="card">In Progress<strong id="doingTasks">0</strong></div>
</div>

<div class="progress-wrapper">
<div class="progress-bar"><div class="progress" id="progress"></div></div>
</div>
</header>

<div class="board">

<div class="column" data-column="todo">
<h3>To Do</h3>
<div class="tasks"></div>

<div class="add-task">
<input class="task-input" placeholder="New task">

<div class="task-options">
<input type="date" class="date-picker">
<select class="priority-picker">
<option value="">Priority</option>
<option value="Low">Low</option>
<option value="Medium">Medium</option>
<option value="High">High</option>
</select>
</div>

<button class="add-btn" onclick="addTask(this)">+</button>
</div>
</div>

<div class="column" data-column="doing">
<h3>Doing</h3>
<div class="tasks"></div>
</div>

<div class="column" data-column="done">
<h3>Done</h3>
<div class="tasks"></div>
<button class="clear-done" onclick="clearDone()">Clear completed</button>
</div>

</div>

<footer>
© 2026 TaskFlow • Developed by Ivan Bussio
</footer>

<script>
let data = JSON.parse(localStorage.getItem("kanban") || '{"todo":[],"doing":[],"done":[]}')

function toggleTheme(){
const btn=document.getElementById("themeBtn")

document.body.classList.toggle("light")

const isLight=document.body.classList.contains("light")

btn.textContent=isLight?"☀️":"🌙"

localStorage.setItem("theme",isLight?"light":"dark")
}

const savedTheme=localStorage.getItem("theme")

if(savedTheme==="light"){
document.body.classList.add("light")
document.getElementById("themeBtn").textContent="☀️"
}

function save(){
localStorage.setItem("kanban",JSON.stringify(data))
render()
}

function render(){

document.querySelectorAll(".tasks").forEach(t=>t.innerHTML="")

Object.keys(data).forEach(col=>{

const container=document.querySelector(`[data-column="${col}"] .tasks`)

data[col].forEach((task,i)=>{

const div=document.createElement("div")

div.className="task"

if(task.includes("[High]")) div.classList.add("priority-high")
else if(task.includes("[Medium]")) div.classList.add("priority-medium")
else if(task.includes("[Low]")) div.classList.add("priority-low")

let btn=""

if(col==="doing"){
btn=`<button class="complete" onclick="completeTask(${i})">Complete</button>`
}else{
btn=`<button class="delete" onclick="moveTask('${col}',${i})">Move</button>`
}

div.innerHTML=`<span ondblclick="editTask('${col}',${i})">${task}</span>${btn}`

container.appendChild(div)

})

})

}

function addTask(btn){

const box=btn.closest(".add-task")

const text=box.querySelector(".task-input").value.trim()

if(!text) return

const date=box.querySelector(".date-picker").value
const priority=box.querySelector(".priority-picker").value

let task=text

if(priority) task+=` [${priority}]`
if(date) task+=` (${date})`

data.todo.push(task)

box.querySelector(".task-input").value=""
box.querySelector(".date-picker").value=""
box.querySelector(".priority-picker").value=""

save()
}

function moveTask(col,i){

if(col==="todo"){
data.doing.push(data.todo.splice(i,1)[0])
}else if(col==="doing"){
data.done.push(data.doing.splice(i,1)[0])
}

save()
}

function completeTask(i){

data.done.push(data.doing.splice(i,1)[0])

save()
}

function clearDone(){
data.done=[]
save()
}

function editTask(col,i){

const t=prompt("Edit task",data[col][i])

if(t) data[col][i]=t

save()
}

render()
</script>

</body>
</html>
