<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

/* ================= BODY ================= */

body{
margin:0;
font-family:'Poppins',sans-serif;
min-height:100vh;
background:#0f172a;
color:white;
overflow-x:hidden;
transition:background .3s,color .3s;
}

/* ===== Elegant Aurora Background ===== */

body::before{
content:"";
position:fixed;
inset:-30%;
background:
radial-gradient(circle at 20% 30%, rgba(99,102,241,0.45), transparent 45%),
radial-gradient(circle at 80% 40%, rgba(56,189,248,0.35), transparent 45%),
radial-gradient(circle at 60% 80%, rgba(34,197,94,0.30), transparent 45%),
radial-gradient(circle at 40% 60%, rgba(236,72,153,0.28), transparent 45%);
filter:blur(90px);
animation:auroraMove 28s linear infinite;
opacity:.9;
z-index:-1;
}

@keyframes auroraMove{
0%{transform:translate(0,0) rotate(0deg)}
50%{transform:translate(120px,-80px) rotate(180deg)}
100%{transform:translate(0,0) rotate(360deg)}
}

/* ===== Light mode ===== */

body.light{
background:#f5f7fb;
color:#1f2937;
}

body.light::before{
display:none;
}

/* ================= HEADER ================= */

header{
position:relative;
display:flex;
flex-direction:column;
align-items:center;
padding:40px 20px 10px;
text-align:center;
}

header h1{
margin:0;
font-size:34px;
}

header p{
opacity:.9;
margin-top:6px;
}

/* Theme button */

.theme-toggle{
position:absolute;
top:20px;
right:20px;
padding:8px 10px;
border:none;
border-radius:8px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(6px);
color:white;
cursor:pointer;
font-size:18px;
transition:transform .25s ease, background .25s;
}

.theme-toggle:hover{
transform:scale(1.15) rotate(8deg);
background:rgba(0,0,0,0.55);
}

/* ================= DASHBOARD ================= */

.dashboard{
display:flex;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:rgba(255,255,255,0.15);
padding:12px 18px;
border-radius:12px;
font-size:14px;
min-width:120px;
}

.card strong{
display:block;
font-size:20px;
}

/* ================= PROGRESS ================= */

.progress-wrapper{
width:260px;
margin-top:15px;
}

.progress-bar{
height:10px;
background:rgba(255,255,255,0.3);
border-radius:10px;
overflow:hidden;
}

.progress{
height:100%;
background:#00e676;
width:0%;
transition:width .3s;
}

/* ================= BOARD ================= */

.board{
display:flex;
justify-content:center;
gap:30px;
padding:30px;
flex-wrap:wrap;
}

/* ================= COLUMN ================= */

.column{
background:rgba(255,255,255,0.15);
border-radius:16px;
padding:20px;
width:300px;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

.column h3{
text-align:center;
text-transform:uppercase;
letter-spacing:1px;
margin-top:0;
}

/* ================= TASKS ================= */

.tasks{
min-height:80px;
margin-bottom:10px;
border-radius:8px;
}

.task{
background:white;
color:#2f3640;
padding:8px 10px;
border-radius:8px;
margin-bottom:8px;
cursor:grab;
border-left:4px solid transparent;
font-size:13px;
line-height:1.3;
transition:transform .15s ease, box-shadow .15s ease;
}

.task:hover{
transform:translateY(-2px);
box-shadow:0 6px 14px rgba(0,0,0,0.25);
}

/* Priority colors */

.task.priority-high{border-left-color:#e74c3c}
.task.priority-medium{border-left-color:#f1c40f}
.task.priority-low{border-left-color:#2ecc71}

/* ================= ADD TASK ================= */

.add-task{
display:flex;
flex-direction:column;
gap:6px;
}

.add-task input{
padding:8px;
border-radius:6px;
border:none;
}

.task-options{
display:flex;
gap:6px;
}

.task-options input,
.task-options select{
flex:1;
padding:6px;
border-radius:6px;
border:none;
font-size:12px;
}

.add-btn{
padding:6px;
font-size:13px;
background:#3b82f6;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* Buttons */

button.delete{
background:#ef4444;
margin-top:6px;
width:100%;
padding:6px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
font-size:12px;
}

button.complete{
background:#22c55e;
margin-top:6px;
width:100%;
padding:6px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
font-size:12px;
}

.clear-done{
margin-top:10px;
width:100%;
background:#ff7675;
padding:10px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
font-size:14px;
opacity:.8;
}

</style>
</head>

<body>

<header>
<h1>TaskFlow Pro</h1>
<p>Organize your work with a modern Kanban board</p>

<button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙</button>

<div class="dashboard">
<div class="card">Total Tasks<strong id="totalTasks">0</strong></div>
<div class="card">Completed<strong id="doneTasks">0</strong></div>
<div class="card">In Progress<strong id="doingTasks">0</strong></div>
</div>

<div class="progress-wrapper">
<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>
</div>
</header>

<div class="board">

<div class="column" data-column="todo">
<h3>To Do</h3>
<div class="tasks"></div>

<div class="add-task">
<input class="task-input" placeholder="New task">

<div class="task-options">
<input type="date" class="date-picker">
<select class="priority-picker">
<option value="">Priority</option>
<option value="Low">Low</option>
<option value="Medium">Medium</option>
<option value="High">High</option>
</select>
</div>

<button class="add-btn" onclick="addTask(this)">+</button>
</div>
</div>

<div class="column" data-column="doing">
<h3>Doing</h3>
<div class="tasks"></div>
</div>

<div class="column" data-column="done">
<h3>Done</h3>
<div class="tasks"></div>
<button class="clear-done" onclick="clearDone()">Clear completed</button>
</div>

</div>

<footer>
© 2026 TaskFlow • Developed by Ivan Bussio
</footer>

<script>

let data = JSON.parse(localStorage.getItem("kanban") || '{"todo":[],"doing":[],"done":[]}')

function toggleTheme(){

const btn=document.getElementById("themeBtn")

document.body.classList.toggle("light")

const isLight=document.body.classList.contains("light")

btn.textContent=isLight?"☀️":"🌙"

localStorage.setItem("theme",isLight?"light":"dark")

}

const savedTheme=localStorage.getItem("theme")

if(savedTheme==="light"){
document.body.classList.add("light")
document.getElementById("themeBtn").textContent="☀️"
}

function save(){
localStorage.setItem("kanban",JSON.stringify(data))
render()
}

function render(){

document.querySelectorAll(".tasks").forEach(t=>t.innerHTML="")

Object.keys(data).forEach(col=>{

const container=document.querySelector(`[data-column="${col}"] .tasks`)

data[col].forEach((task,i)=>{

const div=document.createElement("div")

div.className="task"

if(task.includes("[High]")) div.classList.add("priority-high")
else if(task.includes("[Medium]")) div.classList.add("priority-medium")
else if(task.includes("[Low]")) div.classList.add("priority-low")

let btn=""

if(col==="doing"){
btn=`<button class="complete" onclick="completeTask(${i})">Complete</button>`
}else{
btn=`<button class="delete" onclick="moveTask('${col}',${i})">Move</button>`
}

div.innerHTML=`<span ondblclick="editTask('${col}',${i})">${task}</span>${btn}`

container.appendChild(div)

})

})

}

function addTask(btn){

const box=btn.closest(".add-task")

const text=box.querySelector(".task-input").value.trim()

if(!text) return

const date=box.querySelector(".date-picker").value
const priority=box.querySelector(".priority-picker").value

let task=text

if(priority) task+=` [${priority}]`
if(date) task+=` (${date})`

data.todo.push(task)

box.querySelector(".task-input").value=""
box.querySelector(".date-picker").value=""
box.querySelector(".priority-picker").value=""

save()

}

function moveTask(col,i){

if(col==="todo"){
data.doing.push(data.todo.splice(i,1)[0])
}else if(col==="doing"){
data.done.push(data.doing.splice(i,1)[0])
}

save()

}

function completeTask(i){

data.done.push(data.doing.splice(i,1)[0])

save()

}

function clearDone(){
data.done=[]
save()
}

function editTask(col,i){

const t=prompt("Edit task",data[col][i])

if(t) data[col][i]=t

save()

}

render()

</script>

</body>
</html>
