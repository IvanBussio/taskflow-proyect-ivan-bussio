<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
button{all:unset;cursor:pointer;}

:root{
  --violet:#7c3aed;
}

/* 🌌 FONDO ANIMADO */
body{
  font-family:Inter,sans-serif;
  color:#e5e7eb;
  min-height:100vh;
  overflow-x:hidden;
  background:#0a0a0f;
}

body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background: repeating-linear-gradient(
    45deg,
    rgba(124,58,237,0.05),
    rgba(124,58,237,0.05) 2px,
    transparent 2px,
    transparent 40px
  );
  animation: moveBg 20s linear infinite;
  z-index:-1;
}

@keyframes moveBg{
  from{transform:translate(0,0);}
  to{transform:translate(-200px,-200px);}
}

/* ☀️ LIGHT */
body.light{
  background:#f8fafc;
  color:#0f172a;
}

body.light::before{
  background: repeating-linear-gradient(
    45deg,
    rgba(124,58,237,0.08),
    rgba(124,58,237,0.08) 2px,
    transparent 2px,
    transparent 40px
  );
}

/* APP FULL */
.app{
  width:100%;
  padding:30px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.header button{
  background:#1f2937;
  padding:10px;
  border-radius:12px;
}

body.light .header button{
  background:#e2e8f0;
}

/* TITLE */
h1{text-align:center;font-size:2.5rem;}
.subtitle{text-align:center;margin-bottom:20px;}

/* STATS */
.stats{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
  background:#1f2937;
  padding:10px;
  border-radius:12px;
}

body.light .stats{
  background:#e2e8f0;
}

/* INPUT */
.input-group{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input{
  flex:1;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#1f2937;
  color:white;
}

body.light input{
  background:#f1f5f9;
  color:#0f172a;
}

input:focus{
  outline:none;
  box-shadow:0 0 10px var(--violet);
}

/* ADD */
.add-btn{
  background:var(--violet);
  padding:0 20px;
  border-radius:12px;
  color:white;
}

/* GRID */
#taskList{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

@media(min-width:1200px){
  #taskList{
    grid-template-columns:1fr 1fr;
  }
}

@media(min-width:2000px){
  #taskList{
    grid-template-columns:1fr 1fr 1fr;
  }
}

/* TASK */
.task{
  background:#1f2937;
  padding:14px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.2s;
}

body.light .task{
  background:white;
  border:1px solid #e2e8f0;
}

.task:hover{
  transform:scale(1.02);
  box-shadow:0 0 15px rgba(124,58,237,0.2);
}

/* CLICK COMPLETAR */
.task.clickable{
  cursor:pointer;
}

/* LEFT */
.left{
  display:flex;
  align-items:center;
  gap:10px;
}

/* BADGE */
.badge{
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
  background:var(--violet);
  color:white;
}

/* DELETE */
.delete{
  color:#9ca3af;
}

.delete:hover{
  color:#ef4444;
}

/* COMPLETED */
.completed span{
  text-decoration:line-through;
  opacity:0.5;
}

/* MOBILE */
@media(max-width:768px){
  .input-group{flex-direction:column;}
  .add-btn{width:100%;text-align:center;padding:12px;}
  .task{flex-direction:column;align-items:flex-start;}
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<button onclick="toggleMode()">🌙</button>
<button onclick="showInfo()">ℹ️</button>
</div>

<h1>TaskFlow</h1>
<p class="subtitle">Organiza tu día</p>

<div class="stats">
<div>Total: <span id="total">0</span></div>
<div>✔: <span id="done">0</span></div>
<div>⏳: <span id="pending">0</span></div>
</div>

<div class="input-group">
<input id="taskInput" placeholder="Escribe algo...">
<button class="add-btn" onclick="addTask()">+</button>
</div>

<div id="taskList"></div>

</div>

<script>

/* IA MEJORADA */
function detectCategory(text){
text=text.toLowerCase();

if(text.includes("comprar")||text.includes("super")) return "Compras";
if(text.includes("estudiar")||text.includes("curso")) return "Estudio";
if(text.includes("gym")||text.includes("entrenar")) return "Gym";
if(text.includes("trabajo")) return "Trabajo";
if(text.includes("comer")||text.includes("cena")) return "Comida";

return "General";
}

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

/* ADD */
function addTask(){
if(!taskInput.value.trim()) return;

tasks.push({
text:taskInput.value,
completed:false,
category:detectCategory(taskInput.value)
});

taskInput.value="";
save();
}

/* RENDER */
function render(){
taskList.innerHTML="";

tasks.forEach((t,i)=>{
taskList.innerHTML+=`
<div class="task clickable ${t.completed?"completed":""}" onclick="toggle(${i})">

<div class="left">
<input type="checkbox" ${t.completed?"checked":""}>
<span>${t.text}</span>
<span class="badge">${t.category}</span>
</div>

<button class="delete" onclick="event.stopPropagation(); del(${i})">✖</button>

</div>`;
});

updateStats();
}

/* STATS */
function updateStats(){
total.textContent=tasks.length;
done.textContent=tasks.filter(t=>t.completed).length;
pending.textContent=tasks.filter(t=>!t.completed).length;
}

/* FUNCIONES */
function toggle(i){
tasks[i].completed=!tasks[i].completed;
save();
}

function del(i){
tasks.splice(i,1);
save();
}

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
render();
}

/* MODE */
function toggleMode(){
document.body.classList.toggle("light");
}

/* INFO PRO */
function showInfo(){
alert(`TaskFlow PRO 🚀

✔ Click en tarea = completar
✔ IA detecta categorías
✔ Drag & Drop (próximo nivel)
✔ Diseño responsive 4K

Desarrollado por Ivan`);
}

/* IA realtime */
taskInput.addEventListener("input",()=>{
taskInput.placeholder="→ "+detectCategory(taskInput.value);
});

render();

</script>

</body>
</html>
