<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
button{all:unset;cursor:pointer;}
:root{--violet:#7c3aed;}

body{font-family:Inter;transition:0.3s;}
body.dark{background:#0a0a0f;color:#e5e7eb;}
body.light{background:linear-gradient(135deg,#f5f3ff,#eef2ff);color:#1e293b;}

/* fondo */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:
radial-gradient(circle at 20% 20%, rgba(124,58,237,0.2), transparent 40%),
radial-gradient(circle at 80% 80%, rgba(124,58,237,0.2), transparent 40%);
animation:moveBg 20s linear infinite;
z-index:-1;
}
@keyframes moveBg{
0%{transform:translate(0,0);}
50%{transform:translate(-200px,-200px);}
100%{transform:translate(0,0);}
}

/* layout */
.app{max-width:1100px;margin:auto;padding:40px;display:flex;flex-direction:column;min-height:100vh;}
.header{display:flex;justify-content:space-between;align-items:center;}

h1{font-size:2.5rem;border-bottom:3px solid var(--violet);}

/* botones */
.btn{
padding:10px 14px;
border-radius:12px;
background:rgba(124,58,237,0.2);
border:1px solid rgba(124,58,237,0.4);
transition:0.2s;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(124,58,237,0.4);}

/* inputs */
.input-group{display:flex;gap:10px;margin:20px 0;}

input, select{
padding:14px;
border-radius:12px;
border:1px solid transparent;
background:rgba(20,20,30,0.8);
color:inherit;
font-size:14px;
appearance:none;
-webkit-appearance:none;
-moz-appearance:none;
background-clip:padding-box;
}

input{flex:1;}

select{
padding-right:35px;
background-image:url("data:image/svg+xml;utf8,<svg fill='%237c3aed' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5 7l5 5 5-5z'/></svg>");
background-repeat:no-repeat;
background-position:right 10px center;
background-size:16px;
cursor:pointer;
}
select::-ms-expand{display:none;}

body.light input,body.light select{
background:white;
border:1px solid rgba(124,58,237,0.2);
}

input:focus, select:focus{
outline:none;
border:1px solid var(--violet);
box-shadow:0 0 0 2px rgba(124,58,237,0.3);
}

/* tareas */
.task{
margin-top:10px;
padding:14px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
background:rgba(20,20,30,0.6);
transition:0.2s;
}

.task > div{
display:flex;
align-items:center;
gap:10px;
flex-wrap:wrap;
max-width:90%;
}

.task-text{
word-break:break-word;
max-width:300px;
}

body.light .task{background:rgba(255,255,255,0.7);}

.completed .task-text{
text-decoration:line-through;
color:#22c55e;
}

/* prioridad visual */
.task[data-priority="Alta"]{border-left:4px solid #ef4444;}
.task[data-priority="Media"]{border-left:4px solid #f59e0b;}
.task[data-priority="Baja"]{border-left:4px solid #22c55e;}

/* badges */
.badge{
margin-left:8px;
padding:4px 10px;
border-radius:999px;
font-size:11px;
background:rgba(124,58,237,0.2);
}

.priority-Alta{background:#ef4444;color:white;}
.priority-Media{background:#f59e0b;color:white;}
.priority-Baja{background:#22c55e;color:white;}

/* delete */
.delete-btn{
transition:0.2s;
color:#9ca3af;
font-weight:bold;
}
.delete-btn:hover{
color:#ef4444;
transform:scale(1.2);
}

/* checkbox limpio */
.checkbox{
display:flex;
align-items:center;
justify-content:center;
width:20px;
height:20px;
}

.checkbox input{
display:none;
}

.checkmark{
width:20px;
height:20px;
border-radius:6px;
border:2px solid var(--violet);
display:flex;
align-items:center;
justify-content:center;
}

.checkmark::after{
content:"";
width:5px;
height:10px;
border:solid white;
border-width:0 2px 2px 0;
transform:rotate(45deg);
display:none;
}

.checkbox input:checked + .checkmark{
background:var(--violet);
}

.checkbox input:checked + .checkmark::after{
display:block;
}

.footer{margin-top:auto;text-align:center;opacity:0.6;}
</style>
</head>

<body class="dark">

<div class="app">

<div class="header">
<h1>TaskFlow</h1>

<div style="display:flex; gap:10px;">
<button class="btn" onclick="toggleMode()" id="modeBtn">🌙</button>
<button class="btn" onclick="showInfo()">ℹ️</button>
</div>
</div>

<div class="input-group">
<input id="taskInput" placeholder="Añadir tarea...">

<select id="categorySelect">
<option value="">Auto</option>
<option>Compras</option>
<option>Trabajo</option>
<option>Estudio</option>
<option>Fitness</option>
<option>Comida</option>
<option>Viaje</option>
<option>Social</option>
</select>

<button class="btn" onclick="addTask()">+</button>
</div>

<div style="display:flex; gap:10px; margin-bottom:20px;">
<button class="btn" onclick="selectAll()">Seleccionar todas</button>
<button class="btn" onclick="deleteCompleted()">Borrar completadas</button>
<button class="btn" onclick="sortTasks()">Ordenar</button>
<button class="btn" onclick="deleteAll()">Borrar todo</button>
</div>

<div id="taskList"></div>

<footer class="footer">
Designed & Built by Ivan
</footer>

</div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

/* IA CATEGORIA */
function detectCategory(text){
text=text.toLowerCase();

const rules=[
{cat:"Compras",keys:["comprar","super","pan","leche"]},
{cat:"Estudio",keys:["estudiar","curso","ingles"]},
{cat:"Trabajo",keys:["trabajo","email","reunion"]},
{cat:"Fitness",keys:["gym","entrenar"]},
{cat:"Comida",keys:["comer","cena"]},
{cat:"Viaje",keys:["viaje","hotel"]},
];

for(let r of rules){
if(r.keys.some(k=>text.includes(k))) return r.cat;
}
return "General";
}

/* IA PRIORIDAD MEJORADA */
function detectPriority(text){
text=text.toLowerCase();

if(text.includes("urgente")||text.includes("ya")||text.includes("hoy")) return "Alta";
if(text.includes("mañana")||text.includes("luego")) return "Baja";

if(text.includes("comprar")||text.includes("pagar")||text.includes("medicamentos")) return "Alta";

return "Media";
}

/* ADD */
function addTask(){
if(!taskInput.value.trim()) return;

let text=taskInput.value.trim();
let manual=categorySelect.value;

tasks.unshift({
id:Date.now(),
text:text,
completed:false,
category:manual||detectCategory(text),
priority:detectPriority(text)
});

taskInput.value="";
categorySelect.value="";
save();
}

/* ENTER */
taskInput.addEventListener("keypress",e=>{
if(e.key==="Enter") addTask();
});

/* TOGGLE */
function toggle(id){
tasks=tasks.map(t=>t.id===id?{...t,completed:!t.completed}:t);
save();
}

/* DELETE */
function del(id){
tasks=tasks.filter(t=>t.id!==id);
save();
}

/* ACTIONS */
function deleteAll(){tasks=[];save();}
function selectAll(){tasks=tasks.map(t=>({...t,completed:true}));save();}
function deleteCompleted(){tasks=tasks.filter(t=>!t.completed);save();}

/* ORDENAR */
function sortTasks(){
const order={Alta:1,Media:2,Baja:3};
tasks.sort((a,b)=>order[a.priority]-order[b.priority]);
save();
}

/* MODE */
function toggleMode(){
document.body.classList.toggle("light");
document.body.classList.toggle("dark");
modeBtn.textContent=document.body.classList.contains("light")?"☀️":"🌙";
}

/* INFO */
function showInfo(){
alert("TaskFlow IA Nivel 2 🚀");
}

/* SAVE */
function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
render();
}

/* RENDER */
function render(){
taskList.innerHTML="";

tasks.forEach(t=>{
const div=document.createElement("div");
div.className=`task ${t.completed?"completed":""}`;
div.setAttribute("data-priority",t.priority);

div.innerHTML=`
<div>
<label class="checkbox">
<input type="checkbox" ${t.completed?"checked":""}>
<span class="checkmark"></span>
</label>

<span class="task-text">${t.text}</span>

<span class="badge">${t.category}</span>
<span class="badge priority-${t.priority}">${t.priority}</span>
</div>

<button class="delete-btn" onclick="del(${t.id})">✖</button>
`;

div.querySelector("input").onclick=()=>toggle(t.id);

taskList.appendChild(div);
});
}

render();

</script>

</body>
</html>
