<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

/* 🌈 FONDO MÁS VISIBLE */
.animated-bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
  background:#f8fafc;
}

.animated-bg svg{
  width:100%;
  height:100%;
}

.animated-bg path{
  fill:none;
  stroke:rgba(0,0,0,0.15);
  stroke-width:2.5;
  stroke-dasharray:1200;
  stroke-dashoffset:1200;
  animation:draw 8s linear infinite;
}

@keyframes draw{
  0%{stroke-dashoffset:1200;}
  50%{stroke-dashoffset:0;}
  100%{stroke-dashoffset:-1200;}
}

/* 🌙 DARK */
body.dark{
  background:#020617;
  color:white;
}

body.dark .animated-bg{
  background:#020617;
}

body.dark .animated-bg path{
  stroke:rgba(255,255,255,0.12);
}

/* 📱 LAYOUT APP */
.app{
  padding:20px;
  max-width:500px;
  margin:auto;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.title{
  font-size:22px;
  font-weight:600;
}

.actions{
  display:flex;
  gap:10px;
}

.icon-btn{
  border:none;
  background:transparent;
  font-size:18px;
  cursor:pointer;
}

/* INPUTS */
input, select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  border:1px solid #e2e8f0;
  background:white;
}

body.dark input,
body.dark select{
  background:#1e293b;
  border:1px solid #334155;
  color:white;
}

/* BOTONES */
.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

button.primary{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-weight:500;
}

button.secondary{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#64748b;
  color:white;
}

/* TAREAS */
.task{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.7);
}

body.dark .task{
  background:rgba(30,41,59,0.7);
}

.task small{
  opacity:0.6;
}

.task button{
  border:none;
  background:none;
  cursor:pointer;
  font-size:16px;
}

/* MODAL INFO */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:15px;
  width:80%;
}

body.dark .modal-content{
  background:#1e293b;
  color:white;
}
</style>
</head>

<body>

<!-- ✏️ FONDO -->
<div class="animated-bg">
<svg viewBox="0 0 800 600">
<path d="M10 100 Q 200 50 400 150 T 800 100"/>
<path d="M0 200 Q 300 100 600 250 T 800 200"/>
<path d="M50 300 Q 250 200 500 350 T 800 300"/>
<path d="M20 400 Q 200 300 400 450 T 800 400"/>
<path d="M0 500 Q 300 400 600 550 T 800 500"/>
</svg>
</div>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="title">TaskFlow</div>

    <div class="actions">
      <button class="icon-btn" onclick="openInfo()">ℹ️</button>
      <button class="icon-btn" id="themeBtn">🌙</button>
    </div>
  </div>

  <!-- INPUTS -->
  <input id="search" placeholder="Buscar...">
  <input id="taskInput" placeholder="Nueva tarea...">

  <input id="newCategory" placeholder="Nueva categoría...">
  <button onclick="addCategory()">+ Categoría</button>

  <select id="categorySelect"></select>

  <!-- BOTONES -->
  <div class="row">
    <button class="primary" onclick="addTask()">Añadir</button>
    <button class="secondary" onclick="sortTasks()">Ordenar</button>
  </div>

  <!-- LISTA -->
  <div id="taskList"></div>

</div>

<!-- MODAL -->
<div class="modal" id="infoModal">
  <div class="modal-content">
    <h3>TaskFlow</h3>
    <p>App para gestionar tareas con categorías, búsqueda y modo oscuro.</p>
    <br>
    <button onclick="closeInfo()">Cerrar</button>
  </div>
</div>

<script>

/* 🌙 DARK MODE */
document.getElementById("themeBtn").onclick = () => {
  document.body.classList.toggle("dark");
};

/* INFO */
function openInfo(){
  document.getElementById("infoModal").style.display="flex";
}
function closeInfo(){
  document.getElementById("infoModal").style.display="none";
}

/* CATEGORÍAS */
let categories=["General"];

function renderCategories(){
  const select=document.getElementById("categorySelect");
  select.innerHTML="";
  categories.forEach(cat=>{
    const o=document.createElement("option");
    o.value=cat;
    o.textContent=cat;
    select.appendChild(o);
  });
}

function addCategory(){
  const input=document.getElementById("newCategory");
  if(!input.value.trim())return;
  categories.push(input.value.trim());
  input.value="";
  renderCategories();
}
renderCategories();

/* TAREAS */
let tasks=[];

function addTask(){
  const input=document.getElementById("taskInput");
  const category=document.getElementById("categorySelect").value;

  if(!input.value.trim())return;

  tasks.push({text:input.value,category,completed:false});
  input.value="";
  renderTasks();
}

function renderTasks(){
  const list=document.getElementById("taskList");
  const search=document.getElementById("search").value.toLowerCase();

  list.innerHTML="";

  tasks.filter(t=>t.text.toLowerCase().includes(search))
  .forEach((t,i)=>{
    const div=document.createElement("div");
    div.className="task";

    div.innerHTML=`
      <div>
        <span style="${t.completed?'text-decoration:line-through':''}">
          ${t.text}
        </span>
        <small>${t.category}</small>
      </div>
      <div>
        <button onclick="toggleTask(${i})">✔️</button>
        <button onclick="deleteTask(${i})">🗑️</button>
      </div>
    `;

    list.appendChild(div);
  });
}

function toggleTask(i){
  tasks[i].completed=!tasks[i].completed;
  renderTasks();
}

function deleteTask(i){
  tasks.splice(i,1);
  renderTasks();
}

/* ORDENAR */
function sortTasks(){
  tasks.sort((a,b)=>a.text.localeCompare(b.text));
  renderTasks();
}

/* BUSCAR */
document.getElementById("search").addEventListener("input",renderTasks);

/* ENTER */
document.getElementById("taskInput").addEventListener("keypress",e=>{
  if(e.key==="Enter") addTask();
});

</script>

</body>
</html>
