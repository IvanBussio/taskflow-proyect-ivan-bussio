<!DOCTYPE html>
<html lang="es" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: 'class',
}
</script>

</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 min-h-screen">

<!-- HEADER -->
<header class="p-4 flex justify-between items-center max-w-5xl mx-auto">
  <h1 class="text-3xl font-bold">TaskFlow</h1>
  <button onclick="toggleMode()" class="px-3 py-1 rounded bg-purple-600 text-white">🌙</button>
</header>

<!-- MAIN -->
<main class="max-w-5xl mx-auto p-4 grid md:grid-cols-3 gap-6">

  <!-- LEFT -->
  <section class="md:col-span-2">

    <!-- FORM -->
    <div class="flex gap-2 mb-4">
      <input id="taskInput" placeholder="Añadir tarea..."
        class="flex-1 p-3 rounded border dark:bg-gray-800">
      <button onclick="addTask()" class="bg-purple-600 text-white px-4 rounded">+</button>
    </div>

    <!-- SEARCH -->
    <input id="searchInput" placeholder="Buscar..."
      class="w-full p-2 mb-4 rounded border dark:bg-gray-800">

    <!-- FILTERS -->
    <div class="flex gap-2 mb-4">
      <button onclick="setFilter('all')" class="px-3 py-1 bg-gray-300 dark:bg-gray-700 rounded">Todas</button>
      <button onclick="setFilter('pending')" class="px-3 py-1 bg-gray-300 dark:bg-gray-700 rounded">Pendientes</button>
      <button onclick="setFilter('done')" class="px-3 py-1 bg-gray-300 dark:bg-gray-700 rounded">Completadas</button>
    </div>

    <!-- ACTIONS -->
    <div class="flex gap-2 mb-4">
      <button onclick="completeAll()" class="px-3 py-1 bg-green-600 text-white rounded">Completar todo</button>
      <button onclick="deleteCompleted()" class="px-3 py-1 bg-red-600 text-white rounded">Borrar completadas</button>
    </div>

    <!-- TASK LIST -->
    <div id="taskList" class="space-y-3"></div>

  </section>

  <!-- ASIDE -->
  <aside class="bg-white dark:bg-gray-800 p-4 rounded shadow h-fit">
    <h2 class="font-bold mb-2">Estadísticas</h2>
    <p>Total: <span id="total">0</span></p>
    <p>Completadas: <span id="done">0</span></p>
    <p>Pendientes: <span id="pending">0</span></p>
  </aside>

</main>

<!-- FOOTER -->
<footer class="text-center mt-10 p-4 opacity-60">
  Made by Ivan — <a href="https://cornerestudios.com" class="text-purple-500">Corner Estudios</a>
</footer>

<script>

/* STATE */
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let filter = "all";

/* ADD */
function addTask(){
  const input = document.getElementById("taskInput");
  if(!input.value.trim()) return;

  tasks.unshift({
    id: Date.now(),
    title: input.value,
    completed:false,
    createdAt: new Date()
  });

  input.value="";
  save();
}

/* TOGGLE */
function toggle(id){
  tasks = tasks.map(t => t.id===id ? {...t, completed:!t.completed} : t);
  save();
}

/* DELETE */
function del(id){
  tasks = tasks.filter(t => t.id !== id);
  save();
}

/* EDIT */
function editTask(id){
  const newText = prompt("Editar tarea:");
  if(!newText) return;

  tasks = tasks.map(t => t.id===id ? {...t, title:newText} : t);
  save();
}

/* FILTER */
function setFilter(type){
  filter = type;
  render();
}

/* ACTIONS */
function completeAll(){
  tasks = tasks.map(t => ({...t, completed:true}));
  save();
}

function deleteCompleted(){
  tasks = tasks.filter(t => !t.completed);
  save();
}

/* SAVE */
function save(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
  render();
}

/* RENDER */
function render(){
  const list = document.getElementById("taskList");
  const search = document.getElementById("searchInput").value.toLowerCase();

  list.innerHTML="";

  let filtered = tasks.filter(t=>{
    if(filter==="pending") return !t.completed;
    if(filter==="done") return t.completed;
    return true;
  });

  filtered = filtered.filter(t=> t.title.toLowerCase().includes(search));

  filtered.forEach(t=>{
    const div = document.createElement("div");

    div.className = "flex justify-between items-center p-3 rounded bg-white dark:bg-gray-800 shadow";

    div.innerHTML = `
      <div class="flex gap-2 items-center">
        <input type="checkbox" ${t.completed?"checked":""}>
        <span class="${t.completed?"line-through opacity-50":""}">
          ${t.title}
        </span>
      </div>

      <div class="flex gap-2">
        <button class="text-blue-500">✏️</button>
        <button class="text-red-500">✖</button>
      </div>
    `;

    div.querySelector("input").onclick = ()=>toggle(t.id);
    div.querySelector(".text-red-500").onclick = ()=>del(t.id);
    div.querySelector(".text-blue-500").onclick = ()=>editTask(t.id);

    list.appendChild(div);
  });

  updateStats();
}

/* STATS */
function updateStats(){
  total.textContent = tasks.length;
  done.textContent = tasks.filter(t=>t.completed).length;
  pending.textContent = tasks.filter(t=>!t.completed).length;
}

/* DARK MODE */
function toggleMode(){
  document.documentElement.classList.toggle("dark");
  localStorage.setItem("theme",
    document.documentElement.classList.contains("dark")
  );
}

/* LOAD THEME */
if(localStorage.getItem("theme")==="true"){
  document.documentElement.classList.add("dark");
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", render);

/* ENTER */
document.getElementById("taskInput").addEventListener("keypress", e=>{
  if(e.key==="Enter") addTask();
});

/* INIT */
render();

</script>

</body>
</html>
