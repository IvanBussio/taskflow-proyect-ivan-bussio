<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Inter,sans-serif;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
  transition:0.3s;
}

/* LIGHT */
body.light{
  background: linear-gradient(135deg,#dbeafe,#bfdbfe);
  color:#0f172a;
}

/* CONTAINER */
.container{padding:40px;}

/* APP */
.app{
  max-width:1400px;
  width:95%;
  margin:auto;
  background:rgba(30,41,59,0.7);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:35px;
  position:relative;
}

body.light .app{
  background:rgba(255,255,255,0.95);
}

/* BOTONES ARRIBA */
.top-buttons{
  position:absolute;
  top:20px;
  left:0;
  right:0;
  width:100%;
  padding:0 25px;
  display:flex;
  justify-content:space-between;
}

.top-buttons button{
  background:rgba(255,255,255,0.1);
  border:none;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.top-buttons button:hover{
  transform:scale(1.1);
}

/* HEADER */
h1{text-align:center;font-size:2.5rem;}
.subtitle{text-align:center;margin-bottom:25px;color:#94a3b8;}

body.light .subtitle{color:#475569;}

/* STATS */
.stats{display:flex;gap:15px;margin-bottom:25px;}

.stat{
  flex:1;
  padding:18px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
}

.total{background:#3b82f6;}
.completed{background:#22c55e;}
.active{background:#f59e0b;}

/* INPUT */
.input-group{display:flex;gap:10px;margin-bottom:20px;}

input{
  flex:1;
  padding:14px;
  border-radius:10px;
  border:none;
  background:#334155;
  color:white;
}

body.light input{
  background:#f1f5f9;
  color:#0f172a;
}

.input-group button{
  background:#22c55e;
  border:none;
  padding:0 20px;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.input-group button:hover{
  transform:scale(1.1);
}

/* FILTERS */
.filters{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.filters button{
  background:none;
  border:none;
  color:#3b82f6;
  cursor:pointer;
  transition:0.2s;
}

.filters button:hover{
  transform:scale(1.1);
}

/* TASK */
.task{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1e293b;
  padding:14px 16px;
  border-radius:12px;
  margin-bottom:10px;
  transition:0.2s;
}

.task:hover{
  transform:scale(1.01);
  background:#253044;
}

body.light .task{
  background:white;
  border:1px solid #e2e8f0;
}

/* TASK CONTENT */
.task-content{
  display:flex;
  align-items:center;
  gap:12px;
  flex:1;
}

.task.completed span{
  text-decoration:line-through;
  opacity:0.5;
}

/* DELETE */
.delete-btn{
  background:none;
  border:none;
  cursor:pointer;
  font-size:16px;
}

/* SELECT */
.category-select{
  background:#334155;
  color:white;
  border:none;
  border-radius:8px;
  padding:5px;
}

body.light .category-select{
  background:#e2e8f0;
  color:#0f172a;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  max-width:400px;
}

body.light .modal-content{
  background:white;
}

/* BOTÓN MODAL */
.modal-content button{
  background:#3b82f6;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.modal-content button:hover{
  background:#2563eb;
  transform:scale(1.05);
}

/* MOBILE */
@media(max-width:768px){
.container{padding:15px;}
.stats{flex-direction:column;}
.input-group{flex-direction:column;}
.filters{flex-direction:column;gap:10px;}
}

</style>
</head>

<body>

<div class="container">
<div class="app">

<div class="top-buttons">
  <button onclick="openInfo()">ℹ️</button>
  <button onclick="toggleMode()">🌙</button>
</div>

<h1>TaskFlow</h1>
<p class="subtitle">Organiza tu día 🚀</p>

<div class="stats">
<div class="stat total">Total<br><span id="total">0</span></div>
<div class="stat completed">Completadas<br><span id="done">0</span></div>
<div class="stat active">Pendientes<br><span id="pending">0</span></div>
</div>

<div class="input-group">
<input id="taskInput" placeholder="Agregar tarea...">
<button onclick="addTask()">+</button>
</div>

<div class="filters">
<button onclick="sortTasks()">Ordenar</button>
<button onclick="deleteCompleted()">Eliminar completadas</button>
</div>

<div id="taskList"></div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="infoModal">
  <div class="modal-content">
    <h2>TaskFlow</h2>
    <p>
    Gestiona tus tareas de forma clara y eficiente.
    <br><br>
    ✔ Añade tareas  
    ✔ Marca completadas  
    ✔ Organiza con categorías  
    ✔ Mantén foco diario  
    </p>
    <br>
    <button onclick="closeInfo()">Cerrar</button>
  </div>
</div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

/* ADD */
function addTask(){
if(!taskInput.value.trim())return;

tasks.push({
text:taskInput.value,
completed:false,
category:"📌 General"
});

taskInput.value="";
save();
}

/* RENDER */
function renderTasks(){
taskList.innerHTML="";

tasks.forEach((t,i)=>{

const div=document.createElement("div");
div.className="task"+(t.completed?" completed":"");

div.innerHTML=`
<div class="task-content">

<label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
<input type="checkbox" ${t.completed?"checked":""} onclick="toggleTask(${i})">
<span>${t.text}</span>
</label>

<select class="category-select" onchange="changeCategory(${i},this.value)">
<option ${t.category==="📌 General"?"selected":""}>📌 General</option>
<option ${t.category==="🛒 Compras"?"selected":""}>🛒 Compras</option>
<option ${t.category==="📚 Estudio"?"selected":""}>📚 Estudio</option>
</select>

</div>

<button class="delete-btn" onclick="deleteTask(${i})">✖</button>
`;

taskList.appendChild(div);

});

updateStats();
}

/* FUNCIONES */
function toggleTask(i){
tasks[i].completed=!tasks[i].completed;
save();
}

function deleteTask(i){
tasks.splice(i,1);
save();
}

function deleteCompleted(){
tasks=tasks.filter(t=>!t.completed);
save();
}

function sortTasks(){
tasks.sort((a,b)=>a.text.localeCompare(b.text));
save();
}

function changeCategory(i,val){
tasks[i].category=val;
save();
}

/* STATS */
function updateStats(){
total.textContent=tasks.length;
done.textContent=tasks.filter(t=>t.completed).length;
pending.textContent=tasks.filter(t=>!t.completed).length;
}

/* SAVE */
function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
renderTasks();
}

/* INFO */
function openInfo(){infoModal.style.display="flex";}
function closeInfo(){infoModal.style.display="none";}

/* MODE */
function toggleMode(){
document.body.classList.toggle("light");
}

/* ENTER */
taskInput.addEventListener("keypress",e=>{
if(e.key==="Enter")addTask();
});

renderTasks();

</script>

</body>
</html>
