<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
  font-family:'Inter',sans-serif;
  margin:0;
  transition:0.4s;
}

/* 🌿 CLARO */
body.light{
  background:#9fd3b3;
}

/* 🌌 OSCURO */
body.dark{
  background:#0f172a;
  color:white;
}

/* ✏️ FONDO LINEAS VERTICALES */
.bg-lines{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  pointer-events:none;
  opacity:.1;
}

.bg-lines::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    to right,
    transparent,
    transparent 30px,
    rgba(0,0,0,0.2) 32px
  );
  animation:moveLines 8s linear infinite;
}

@keyframes moveLines{
  from{transform:translateX(0)}
  to{transform:translateX(40px)}
}

/* tarjetas */
.card{
  background:rgba(255,255,255,0.6);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

.dark .card{
  background:rgba(30,41,59,0.7);
}

/* botones */
.btn{
  padding:8px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.1);
}

/* tareas */
.task{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  background:rgba(255,255,255,0.7);
}

.dark .task{
  background:#1e293b;
}

.completed{
  text-decoration:line-through;
  opacity:.5;
}

/* chips */
.chip{
  padding:3px 8px;
  border-radius:8px;
  font-size:12px;
  color:white;
}

.cat-Trabajo{background:#3b82f6;}
.cat-Personal{background:#10b981;}
.cat-Compras{background:#f59e0b;}
.cat-Estudio{background:#8b5cf6;}
.cat-Gym{background:#ef4444;}

/* modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:white;
  padding:25px;
  border-radius:15px;
  max-width:400px;
}

.dark .modal-box{
  background:#1e293b;
  color:white;
}

</style>
</head>

<body class="light">

<div class="bg-lines"></div>

<header style="display:flex;justify-content:space-between;padding:20px">

<h1>TaskFlow</h1>

<div>
<button class="btn" onclick="openInfo()">Info</button>
<button class="btn" onclick="toggleTheme()">🌙</button>
</div>

</header>

<main style="max-width:600px;margin:auto">

<div class="card">

<input id="input" placeholder="Nueva tarea..." style="width:100%;padding:8px;margin-bottom:8px">

<input id="categoryInput" placeholder="Categoría..." style="width:100%;padding:8px;margin-bottom:8px">

<button class="btn" onclick="addTask()">Añadir</button>
<button class="btn" onclick="deleteAll()">Eliminar todo</button>

</div>

<div id="taskList"></div>

</main>

<!-- MODAL INFO -->
<div id="infoModal" class="modal" style="display:none" onclick="closeInfo(event)">
  <div class="modal-box">
    <h2>Sobre TaskFlow</h2>
    <p>App para organizar tareas con categorías inteligentes.</p>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
