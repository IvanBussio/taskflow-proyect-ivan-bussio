<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Inter,sans-serif;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
  min-height:100vh;
  transition:0.3s;
}

/* LIGHT MODE */
body.light{
  background: linear-gradient(135deg,#dbeafe,#bfdbfe);
  color:#0f172a;
}

/* CONTAINER */
.container{padding:40px;}

.app{
  max-width:1200px;
  margin:auto;
  background:rgba(30,41,59,0.7);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:30px;
  position:relative;
}

/* LIGHT APP */
body.light .app{
  background:rgba(255,255,255,0.95);
  box-shadow:0 10px 40px rgba(0,0,0,0.1);
}

/* BOTONES */
.top-buttons{
  position:absolute;
  top:15px;
  left:15px;
  right:15px;
  display:flex;
  justify-content:space-between;
}

.top-buttons button{
  background:rgba(255,255,255,0.08);
  border:none;
  color:#cbd5f5;
  padding:8px 10px;
  border-radius:10px;
  cursor:pointer;
}

body.light .top-buttons button{
  background:#f1f5f9;
  color:#0f172a;
}

/* HEADER */
h1{text-align:center;font-size:2.2rem;}
.subtitle{text-align:center;margin-bottom:20px;color:#94a3b8;}

body.light .subtitle{color:#475569;}

/* STATS */
.stats{display:flex;gap:10px;margin-bottom:20px;}

.stat{
  flex:1;
  padding:15px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
}

.total{background:rgba(59,130,246,0.2);}
.done{background:rgba(34,197,94,0.2);}
.pending{background:rgba(244,114,182,0.2);}

/* LIGHT STATS */
body.light .total{background:#dbeafe;color:#2563eb;}
body.light .done{background:#dcfce7;color:#16a34a;}
body.light .pending{background:#fce7f3;color:#db2777;}

/* INPUT */
.input-group{display:flex;gap:10px;margin-bottom:20px;}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#334155;
  color:white;
}

body.light input{
  background:#f1f5f9;
  color:#0f172a;
  border:1px solid #e2e8f0;
}

.input-group button{
  padding:0 20px;
  border-radius:10px;
  border:none;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

/* FILTERS */
.filters{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.filters input{
  width:200px;
}

.filters button{
  background:none;
  border:none;
  color:#60a5fa;
  cursor:pointer;
}

/* TASK */
.task{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

body.light .task{
  background:#ffffff;
  border:1px solid #e2e8f0;
}

.task-content{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
}

.task.completed span{
  text-decoration:line-through;
  opacity:0.5;
}

.delete-btn{
  background:none;
  border:none;
  color:#64748b;
  cursor:pointer;
}

/* SELECT */
.category-select{
  background:#334155;
  color:white;
  border:none;
  padding:5px 10px;
  border-radius:8px;
}

body.light .category-select{
  background:#e2e8f0;
  color:#0f172a;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}

body.light .modal-content{
  background:white;
}

/* WELCOME */
.welcome{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  padding:12px 20px;
  border-radius:10px;
  display:none;
}

/* MOBILE */
@media(max-width:768px){
.container{padding:15px;}
.stats{flex-direction:column;}
.input-group{flex-direction:column;}
.filters{flex-direction:column;gap:10px;}
}

</style>
</head>

<body>

<div class="container">
<div class="app">

<div class="top-buttons">
  <button onclick="openInfo()">ℹ️</button>
  <button onclick="toggleMode()">🌙</button>
</div>

<h1>TaskFlow</h1>
<p class="subtitle">Organiza tu día 🚀</p>

<div class="stats">
<div class="stat total">TOTAL <span id="total">0</span></div>
<div class="stat done">OK <span id="done">0</span></div>
<div class="stat pending">PEND <span id="pending">0</span></div>
</div>

<div class="input-group">
<input id="taskInput" placeholder="Agregar tarea...">
<button onclick="addTask()">+</button>
</div>

<div class="filters">
<input id="search" placeholder="Buscar..." oninput="renderTasks()">
<button onclick="sortTasks()">Ordenar</button>
<button onclick="deleteCompleted()">Eliminar completadas</button>
</div>

<div id="taskList"></div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="infoModal">
  <div class="modal-content">
    <h3>TaskFlow</h3>
    <p>Organizá tu día fácil 🚀</p>
    <br>
    <button onclick="closeInfo()">Cerrar</button>
  </div>
</div>

<!-- WELCOME -->
<div class="welcome" id="welcomeMsg">Bienvenido 👋</div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

/* ADD */
function addTask(){
if(!taskInput.value.trim())return;
tasks.push({text:taskInput.value,completed:false,category:"📌 General"});
taskInput.value="";
save();
}

/* RENDER */
function renderTasks(){
taskList.innerHTML="";
tasks.forEach((t,i)=>{
taskList.innerHTML+=`
<div class="task">
<div class="task-content" onclick="toggleTask(${i})">
<input type="checkbox" ${t.completed?"checked":""}>
<span>${t.text}</span>
<select class="category-select" onchange="changeCategory(${i},this.value)">
<option>📌 General</option>
<option>🛒 Compras</option>
<option>📚 Estudio</option>
</select>
</div>
<button class="delete-btn" onclick="deleteTask(${i})">✖</button>
</div>`;
});
updateStats();
}

/* FUNCIONES */
function toggleTask(i){tasks[i].completed=!tasks[i].completed;save();}
function deleteTask(i){tasks.splice(i,1);save();}
function deleteCompleted(){tasks=tasks.filter(t=>!t.completed);save();}
function sortTasks(){tasks.sort((a,b)=>a.text.localeCompare(b.text));save();}
function changeCategory(i,val){tasks[i].category=val;save();}

/* STATS */
function updateStats(){
total.textContent=tasks.length;
done.textContent=tasks.filter(t=>t.completed).length;
pending.textContent=tasks.filter(t=>!t.completed).length;
}

/* SAVE */
function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
renderTasks();
}

/* INFO */
function openInfo(){infoModal.style.display="flex";}
function closeInfo(){infoModal.style.display="none";}

/* MODE */
function toggleMode(){document.body.classList.toggle("light");}

/* WELCOME */
window.addEventListener("load",()=>{
if(!localStorage.getItem("visited")){
welcomeMsg.style.display="block";
setTimeout(()=>welcomeMsg.style.display="none",3000);
localStorage.setItem("visited","true");
}
});

taskInput.addEventListener("keypress",e=>{
if(e.key==="Enter")addTask();
});

renderTasks();

</script>

</body>
</html>
