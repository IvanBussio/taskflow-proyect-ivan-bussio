<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
button{all:unset;cursor:pointer;}

body{
  font-family:Inter,sans-serif;
  background:#0a0a0f;
  color:#e5e7eb;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

/* APP */
.app{
  background:rgba(17,24,39,0.8);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:30px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.header button{
  background:#1f2937;
  padding:8px 12px;
  border-radius:10px;
}

/* INPUT */
.input-group{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input{
  flex:1;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#1f2937;
  color:white;
}

.add-btn{
  background:#7c3aed;
  padding:0 20px;
  border-radius:12px;
  color:white;
}

/* TASK */
.task{
  background:#1f2937;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.2s;
}

.task.dragging{
  opacity:0.5;
}

.left{
  display:flex;
  align-items:center;
  gap:10px;
}

/* DELETE */
.delete{
  color:#9ca3af;
  font-size:18px;
}

.delete:hover{
  color:#ef4444;
}

</style>
</head>

<body>

<div class="container">
<div class="app">

<div class="header">
<button onclick="toggleMode()">🌙</button>
<button onclick="alert('TaskFlow PRO')">ℹ️</button>
</div>

<h1>TaskFlow</h1>

<div class="input-group">
<input id="taskInput" placeholder="Escribe algo...">
<button class="add-btn" onclick="addTask()">+</button>
</div>

<div id="taskList"></div>

</div>
</div>

<script>

/* IA */
function detectCategory(text){
text=text.toLowerCase();

if(text.includes("comprar")) return "Compras";
if(text.includes("estudiar")) return "Estudio";
if(text.includes("gym")) return "Gym";
return "General";
}

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];
let dragIndex=null;

/* ADD */
function addTask(){
if(!taskInput.value.trim()) return;

tasks.push({
text:taskInput.value,
completed:false,
category:detectCategory(taskInput.value)
});

taskInput.value="";
save();
}

/* RENDER */
function render(){
taskList.innerHTML="";

tasks.forEach((t,i)=>{

const div=document.createElement("div");
div.className="task";
div.draggable=true;
div.dataset.index=i;

div.innerHTML=`
<div class="left">
<input type="checkbox" ${t.completed?"checked":""} onclick="toggle(${i})">
<span>${t.text}</span>
</div>
<button class="delete" onclick="del(${i})">✖</button>
`;

addDragEvents(div);

taskList.appendChild(div);

});
}

/* DRAG EVENTS */
function addDragEvents(el){

el.addEventListener("dragstart",()=>{
dragIndex=+el.dataset.index;
el.classList.add("dragging");
});

el.addEventListener("dragend",()=>{
el.classList.remove("dragging");
});

el.addEventListener("dragover",(e)=>{
e.preventDefault();
});

el.addEventListener("drop",()=>{
const dropIndex=+el.dataset.index;

const item=tasks.splice(dragIndex,1)[0];
tasks.splice(dropIndex,0,item);

save();
});

}

/* FUNCIONES */
function toggle(i){tasks[i].completed=!tasks[i].completed;save();}
function del(i){tasks.splice(i,1);save();}

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
render();
}

/* MODE */
function toggleMode(){
document.body.classList.toggle("light");
}

render();

</script>

</body>
</html>
