<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
button{all:unset;cursor:pointer;}

:root{
  --violet:#7c3aed;
}

/* 🌌 FONDO ANIMADO */
body{
  font-family:Inter,sans-serif;
  color:#e5e7eb;
  min-height:100vh;
  background:#0a0a0f;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:
    repeating-linear-gradient(
      60deg,
      rgba(124,58,237,0.06),
      rgba(124,58,237,0.06) 2px,
      transparent 2px,
      transparent 60px
    );
  animation:moveBg 25s linear infinite;
  z-index:-1;
}

@keyframes moveBg{
  from{transform:translate(0,0);}
  to{transform:translate(-300px,-300px);}
}

/* APP */
.app{
  width:100%;
  max-width:1400px;
  margin:auto;
  padding:40px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.header button{
  background:linear-gradient(135deg,#7c3aed,#9333ea);
  color:white;
  padding:10px;
  border-radius:12px;
}

/* TITULO */
h1{text-align:center;font-size:2.5rem;}
.subtitle{text-align:center;margin-bottom:20px;opacity:0.7;}

/* STATS */
.stats{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  background:rgba(20,20,30,0.6);
  backdrop-filter:blur(12px);
  border:1px solid rgba(124,58,237,0.1);
  padding:12px;
  border-radius:16px;
}

/* PROGRESS */
.progress{
  height:8px;
  background:#1f2937;
  border-radius:10px;
  margin-bottom:20px;
  overflow:hidden;
}

#progressBar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#7c3aed,#9333ea);
}

/* INPUT */
.input-group{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input{
  flex:1;
  padding:16px;
  border-radius:14px;
  border:none;
  background:rgba(20,20,30,0.6);
  color:white;
}

input:focus{
  outline:none;
  box-shadow:0 0 10px var(--violet);
}

/* BOTON */
.add-btn{
  background:linear-gradient(135deg,#7c3aed,#9333ea);
  padding:0 22px;
  border-radius:14px;
  color:white;
  font-weight:bold;
}

/* TASK */
#taskList{
  display:grid;
  gap:16px;
}

.task{
  background:rgba(20,20,30,0.6);
  backdrop-filter:blur(12px);
  border:1px solid rgba(124,58,237,0.1);
  padding:16px;
  border-radius:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.2s;
}

.task:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(124,58,237,0.2);
}

.left{
  display:flex;
  align-items:center;
  gap:10px;
}

.badge{
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
  background:rgba(124,58,237,0.2);
  border:1px solid rgba(124,58,237,0.4);
  color:#c4b5fd;
}

.delete{
  color:#9ca3af;
}

.delete:hover{
  color:#ef4444;
}

.completed span{
  text-decoration:line-through;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<button onclick="showInfo()">ℹ️</button>
</div>

<h1>TaskFlow</h1>
<p class="subtitle">Organiza tu día</p>

<div class="stats">
<div>Total: <span id="total">0</span></div>
<div>✔: <span id="done">0</span></div>
<div>⏳: <span id="pending">0</span></div>
</div>

<div class="progress">
<div id="progressBar"></div>
</div>

<div class="input-group">
<input id="taskInput" placeholder="Añadir tarea + Enter">
<button class="add-btn" onclick="addTask()">+</button>
</div>

<div id="taskList"></div>

<footer style="text-align:center; margin-top:40px; opacity:0.6;">
  Ivan — TaskFlow
</footer>

</div>

<script>

function detectCategory(text){
text=text.toLowerCase();
if(text.includes("comprar")) return "Compras";
if(text.includes("estudiar")) return "Estudio";
return "General";
}

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

/* ADD */
function addTask(){
if(!taskInput.value.trim()) return;

tasks.unshift({
text:taskInput.value,
completed:false,
category:detectCategory(taskInput.value)
});

taskInput.value="";
save();
}

/* TOGGLE */
function toggle(i){
tasks[i].completed=!tasks[i].completed;
save();
}

/* DELETE */
function del(i){
tasks.splice(i,1);
save();
}

/* SAVE */
function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
render();
}

/* RENDER */
function render(){
taskList.innerHTML="";

tasks.forEach((t,i)=>{
const div=document.createElement("div");

div.className=`task ${t.completed?"completed":""}`;

div.innerHTML=`
<div class="left">
<input type="checkbox" ${t.completed?"checked":""}>
<span>${t.text}</span>
<span class="badge">${t.category}</span>
</div>
<button class="delete">✖</button>
`;

div.onclick=()=>toggle(i);

div.querySelector(".delete").onclick=(e)=>{
e.stopPropagation();
del(i);
};

taskList.appendChild(div);
});

updateStats();
}

/* STATS */
function updateStats(){
const totalTasks=tasks.length;
const doneTasks=tasks.filter(t=>t.completed).length;

total.textContent=totalTasks;
done.textContent=doneTasks;
pending.textContent=totalTasks-doneTasks;

const percent=totalTasks?(doneTasks/totalTasks)*100:0;
progressBar.style.width=percent+"%";
}

/* INFO */
function showInfo(){
alert("TaskFlow 🚀");
}

/* ENTER */
taskInput.addEventListener("keypress",e=>{
if(e.key==="Enter") addTask();
});

render();

</script>

</body>
</html>
