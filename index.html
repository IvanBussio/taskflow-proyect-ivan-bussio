<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .dark-mode {
      background: #111827;
      color: white;
    }
  </style>
</head>

<body id="body" class="min-h-screen bg-gradient-to-r from-pink-300 to-blue-300 p-4">

  <div class="max-w-md mx-auto bg-white/30 backdrop-blur-lg p-4 rounded-xl shadow-lg">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold">TaskFlow</h1>

      <div class="flex gap-2">
        <button id="btnInfo" class="bg-gray-200 px-2 rounded">ℹ️</button>
        <button id="btnModo" class="bg-gray-200 px-2 rounded">🌙</button>
      </div>
    </div>

    <!-- INPUT TAREA -->
    <input id="inputTarea" type="text" placeholder="Escribe una tarea..."
      class="w-full p-2 mb-3 rounded-lg border" />

    <!-- INPUT CATEGORIA -->
    <div class="flex gap-2 mb-3">
      <input id="inputCategoria" type="text" placeholder="Nueva categoría..."
        class="flex-1 p-2 rounded-lg border" />
      <button id="btnAgregarCat" class="bg-green-500 text-white px-4 rounded-lg">+</button>
    </div>

    <!-- SELECT -->
    <select id="selectCategorias" class="w-full p-2 rounded-lg border mb-3">
      <option value="">Seleccionar categoría</option>
    </select>

    <!-- CHIPS -->
    <div id="chips" class="flex flex-wrap gap-2 mb-3"></div>

    <!-- BOTONES -->
    <div class="flex gap-2 mb-4">
      <button id="btnAgregarTarea" class="bg-blue-500 text-white px-4 py-2 rounded-lg">
        Añadir
      </button>

      <button id="btnBorrar" class="bg-red-500 text-white px-4 py-2 rounded-lg">
        Borrar todo
      </button>
    </div>

    <hr class="mb-4">

    <!-- LISTA -->
    <div id="listaTareas" class="space-y-2"></div>

  </div>

  <!-- MODAL INFO -->
  <div id="modalInfo" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
    <div class="bg-white p-4 rounded-lg max-w-sm">
      <h2 class="text-lg font-bold mb-2">Sobre TaskFlow</h2>
      <p>App para gestionar tareas con categorías.</p>
      <button onclick="cerrarModal()" class="mt-3 bg-blue-500 text-white px-3 py-1 rounded">
        Cerrar
      </button>
    </div>
  </div>

  <script>
    let categorias = [];
    let categoriasSeleccionadas = [];
    let tareas = [];
    let darkMode = false;

    function normalizarCategorias(cats) {
      return cats.map(cat =>
        typeof cat === "string" ? { nombre: cat } : cat
      );
    }

    function getNombre(cat) {
      return typeof cat === "object" ? cat.nombre : cat;
    }

    function cargarDatos() {
      categorias = normalizarCategorias(JSON.parse(localStorage.getItem("categorias")) || []);
      tareas = JSON.parse(localStorage.getItem("tareas")) || [];
      darkMode = JSON.parse(localStorage.getItem("darkMode")) || false;

      aplicarModo();
      renderCategorias();
      renderTareas();
    }

    function guardar() {
      localStorage.setItem("categorias", JSON.stringify(categorias));
      localStorage.setItem("tareas", JSON.stringify(tareas));
      localStorage.setItem("darkMode", JSON.stringify(darkMode));
    }

    function agregarCategoria() {
      const input = document.getElementById("inputCategoria");
      const nombre = input.value.trim();
      if (!nombre) return;

      if (categorias.some(c => getNombre(c) === nombre)) return;

      categorias.push({ nombre });
      input.value = "";
      guardar();
      renderCategorias();
    }

    function renderCategorias() {
      const select = document.getElementById("selectCategorias");
      select.innerHTML = `<option value="">Seleccionar categoría</option>`;

      categorias.forEach(cat => {
        const option = document.createElement("option");
        option.value = getNombre(cat);
        option.textContent = getNombre(cat);
        select.appendChild(option);
      });
    }

    document.getElementById("selectCategorias").addEventListener("change", (e) => {
      const value = e.target.value;
      if (!value) return;

      if (!categoriasSeleccionadas.includes(value)) {
        categoriasSeleccionadas.push(value);
        renderChips();
      }
    });

    function renderChips() {
      const container = document.getElementById("chips");
      container.innerHTML = "";

      categoriasSeleccionadas.forEach(cat => {
        const chip = document.createElement("div");
        chip.className = "bg-orange-500 text-white px-3 py-1 rounded-lg flex items-center gap-2";
        chip.innerHTML = `${cat} <button onclick="eliminarChip('${cat}')">✕</button>`;
        container.appendChild(chip);
      });
    }

    function eliminarChip(cat) {
      categoriasSeleccionadas = categoriasSeleccionadas.filter(c => c !== cat);
      renderChips();
    }

    function borrarTodo() {
      categoriasSeleccionadas = [];
      renderChips();
    }

    function agregarTarea() {
      const input = document.getElementById("inputTarea");
      const texto = input.value.trim();
      if (!texto) return;

      tareas.push({
        texto,
        categorias: [...categoriasSeleccionadas],
        completada: false
      });

      input.value = "";
      categoriasSeleccionadas = [];

      guardar();
      renderChips();
      renderTareas();
    }

    function toggleTarea(index) {
      tareas[index].completada = !tareas[index].completada;
      guardar();
      renderTareas();
    }

    function renderTareas() {
      const lista = document.getElementById("listaTareas");
      lista.innerHTML = "";

      tareas.forEach((t, i) => {
        const div = document.createElement("div");
        div.className = "bg-white p-3 rounded-lg shadow flex justify-between items-center";

        div.innerHTML = `
          <div>
            <p class="${t.completada ? 'line-through text-gray-400' : ''}">
              ${t.texto}
            </p>
            <div class="flex gap-1 mt-1 flex-wrap">
              ${t.categorias.map(c => `<span class="text-xs bg-gray-200 px-2 rounded">${c}</span>`).join("")}
            </div>
          </div>
          <input type="checkbox" ${t.completada ? "checked" : ""} onchange="toggleTarea(${i})"/>
        `;

        lista.appendChild(div);
      });
    }

    // 🌙 Modo oscuro
    function aplicarModo() {
      const body = document.getElementById("body");
      if (darkMode) {
        body.classList.add("dark-mode");
      } else {
        body.classList.remove("dark-mode");
      }
    }

    document.getElementById("btnModo").onclick = () => {
      darkMode = !darkMode;
      guardar();
      aplicarModo();
    };

    // ℹ️ Modal
    document.getElementById("btnInfo").onclick = () => {
      document.getElementById("modalInfo").classList.remove("hidden");
    };

    function cerrarModal() {
      document.getElementById("modalInfo").classList.add("hidden");
    }

    // ⌨️ ENTER
    document.getElementById("inputCategoria").addEventListener("keydown", e => {
      if (e.key === "Enter") agregarCategoria();
    });

    document.getElementById("inputTarea").addEventListener("keydown", e => {
      if (e.key === "Enter") agregarTarea();
    });

    // 🎯 Eventos
    document.getElementById("btnAgregarCat").onclick = agregarCategoria;
    document.getElementById("btnAgregarTarea").onclick = agregarTarea;
    document.getElementById("btnBorrar").onclick = borrarTodo;

    // 🚀 Init
    cargarDatos();
  </script>

</body>
</html>
