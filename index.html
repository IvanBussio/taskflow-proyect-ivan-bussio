<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
padding:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
transition:0.3s;
}

/* fondo animado */

body.light{
background: linear-gradient(270deg,#74ebd5,#acb6e5,#74ebd5);
background-size:600% 600%;
animation:gradient 12s ease infinite;
color:black;
}

body.dark{
background: linear-gradient(270deg,#1f1c2c,#928dab,#1f1c2c);
background-size:600% 600%;
animation:gradient 12s ease infinite;
color:white;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
padding:30px;
border-radius:12px;
width:400px;
text-align:center;
}

.dark .container{
background:rgba(0,0,0,0.4);
}

input{
padding:8px;
margin:5px;
width:70%;
}

button{
padding:6px 10px;
margin:3px;
cursor:pointer;
}

ul{
list-style:none;
padding:0;
}

li{
display:flex;
justify-content:space-between;
padding:6px;
border-bottom:1px solid rgba(0,0,0,0.2);
}

.completed{
text-decoration:line-through;
opacity:0.6;
}

.toggle{
position:absolute;
top:20px;
right:20px;
font-size:22px;
cursor:pointer;
}

</style>

</head>

<body class="light">

<div class="toggle" id="themeToggle">🌙</div>

<div class="container">

<h2>TaskFlow</h2>

<input id="taskInput" placeholder="Add a new task...">
<button onclick="addTask()">Add</button>

<br>

<input id="searchTask" placeholder="Search tasks...">

<br>

<button onclick="filterTasks('all')">All</button>
<button onclick="filterTasks('completed')">Completed</button>
<button onclick="filterTasks('pending')">Pending</button>

<button onclick="sortTasks()">Sort A-Z</button>

<ul id="taskList"></ul>

</div>

<script>

let tasks=[];

function addTask(){

const input=document.getElementById("taskInput");
const text=input.value.trim();

if(text==="") return;

tasks.push({text,completed:false});
input.value="";
renderTasks();
}

function renderTasks(list=tasks){

const ul=document.getElementById("taskList");
ul.innerHTML="";

list.forEach((task,index)=>{

const li=document.createElement("li");

const span=document.createElement("span");
span.textContent=task.text;

if(task.completed){
span.classList.add("completed");
}

span.onclick=()=>{
task.completed=!task.completed;
renderTasks();
}

const del=document.createElement("button");
del.textContent="X";

del.onclick=()=>{
tasks.splice(index,1);
renderTasks();
}

li.appendChild(span);
li.appendChild(del);

ul.appendChild(li);

});

}

document.getElementById("searchTask").addEventListener("input",function(){

const q=this.value.toLowerCase();

const filtered=tasks.filter(t=>
t.text.toLowerCase().includes(q)
);

renderTasks(filtered);

});

function filterTasks(type){

if(type==="completed"){
renderTasks(tasks.filter(t=>t.completed));
}

else if(type==="pending"){
renderTasks(tasks.filter(t=>!t.completed));
}

else{
renderTasks();
}

}

function sortTasks(){

tasks.sort((a,b)=>a.text.localeCompare(b.text));
renderTasks();

}

/* modo oscuro / claro */

const toggle=document.getElementById("themeToggle");

toggle.onclick=()=>{

const body=document.body;

if(body.classList.contains("light")){
body.classList.remove("light");
body.classList.add("dark");
toggle.textContent="☀️";
}

else{
body.classList.remove("dark");
body.classList.add("light");
toggle.textContent="🌙";
}

};

</script>

</body>
</html>
