<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = { darkMode: "class" }
</script>

<style>

body{
font-family:"Inter",sans-serif;
transition:background 0.6s ease,color 0.6s ease;
min-height:100vh;
overflow-x:hidden;
}

/* FONDO */

body.light{
background:
radial-gradient(circle at 20% 30%, #ffd6e7 0%, transparent 50%),
radial-gradient(circle at 80% 40%, #cce4ff 0%, transparent 50%),
radial-gradient(circle at 50% 90%, #e5d4ff 0%, transparent 50%),
#f6f9ff;
}

body.dark{
background:
radial-gradient(circle at 20% 30%, #00ffc8 0%, transparent 50%),
radial-gradient(circle at 80% 40%, #0099ff 0%, transparent 50%),
radial-gradient(circle at 50% 90%, #7c3aed 0%, transparent 50%),
#0f172a;
}

/* TARJETAS */

.card{
padding:24px;
border-radius:18px;
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.2);
transition:0.35s;
}

body.light .card{
background:rgba(255,255,255,0.65);
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

body.dark .card{
background:rgba(30,40,60,0.55);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.card:hover{
transform:translateY(-6px);
}

.completed{
text-decoration:line-through;
color:#ef4444;
}

</style>

</head>

<body class="light flex flex-col items-center p-10">

<div id="themeToggle" class="fixed top-6 right-6 text-2xl cursor-pointer">
🌙
</div>

<h1 class="text-4xl font-bold mb-10">TaskFlow</h1>

<div class="w-full max-w-xl mx-auto space-y-6">

<div class="card">

<input id="taskInput" placeholder="Nueva tarea..." class="w-full border rounded p-2 mb-3">

<button id="addTaskBtn" class="bg-blue-500 text-white px-4 py-2 rounded">
Añadir tarea
</button>

</div>

<div class="card">

<div class="flex justify-between mb-3">

<input id="searchInput" placeholder="Buscar tarea..." class="border rounded p-2 w-2/3">

<button id="sortBtn" class="bg-indigo-500 text-white px-3 py-1 rounded">
Ordenar
</button>

</div>

<div class="flex gap-2 mb-3">

<button id="filterAll" class="bg-gray-300 px-2 py-1 rounded">
Todas
</button>

<button id="filterPending" class="bg-yellow-400 px-2 py-1 rounded">
Pendientes
</button>

<button id="filterDone" class="bg-green-400 px-2 py-1 rounded">
Completadas
</button>

</div>

<div id="taskStats" class="text-sm mb-2"></div>

<ul id="taskList" class="space-y-2"></ul>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
