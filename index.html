<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow Project</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
min-height:100vh;
transition:0.3s;
}

/* fondo animado */

body.light{
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
background-size:600% 600%;
animation:bg 15s ease infinite;
color:white;
}

body.dark{
background:linear-gradient(270deg,#000000,#232526,#414345);
background-size:600% 600%;
animation:bg 15s ease infinite;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
font-size:22px;
font-weight:bold;
}

.container{
max-width:700px;
margin:40px auto;
}

.card{
background:rgba(20,30,40,0.8);
padding:25px;
border-radius:10px;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
background:#3a4452;
color:white;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.primary{
background:#3b82f6;
color:white;
}

.filters button{
background:#4b5563;
color:white;
margin-right:5px;
}

.filters button.active{
background:#3b82f6;
}

.task{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.completed{
text-decoration:line-through;
opacity:0.6;
}

.toggle{
cursor:pointer;
font-size:20px;
}

</style>

</head>

<body class="light">

<header>

TaskFlow Project

<div class="toggle" id="themeToggle">🌙</div>

</header>

<div class="container">

<div class="card">

<h3>Bienvenido a TaskFlow</h3>
<p>Gestiona tus tareas, organiza tu flujo de trabajo y mantén todo bajo control con una interfaz clara y moderna.</p>

</div>

<div class="card">

<h3>Crear nueva tarea</h3>

<input id="taskTitle" placeholder="Título de la tarea">

<textarea id="taskDescription" placeholder="Descripción"></textarea>

<button class="primary" onclick="addTask()">Añadir tarea</button>

</div>

<div class="card">

<h3>Tus tareas</h3>

<input id="searchTask" placeholder="Buscar tareas...">

<div class="filters">

<button onclick="filterTasks('all', this)" class="active">Todas</button>
<button onclick="filterTasks('pending', this)">Pendientes</button>
<button onclick="filterTasks('completed', this)">Completadas</button>

<button onclick="sortTasks()">Orden A-Z</button>

</div>

<div id="taskList"></div>

</div>

</div>

<script>

let tasks=[];
let currentFilter="all";

function addTask(){

const title=document.getElementById("taskTitle").value.trim();
const desc=document.getElementById("taskDescription").value.trim();

if(title==="") return;

tasks.push({
title,
desc,
completed:false
});

document.getElementById("taskTitle").value="";
document.getElementById("taskDescription").value="";

renderTasks();

}

function renderTasks(){

const list=document.getElementById("taskList");
list.innerHTML="";

let filtered=[...tasks];

if(currentFilter==="completed"){
filtered=filtered.filter(t=>t.completed);
}

if(currentFilter==="pending"){
filtered=filtered.filter(t=>!t.completed);
}

const search=document.getElementById("searchTask").value.toLowerCase();

filtered=filtered.filter(t=>t.title.toLowerCase().includes(search));

filtered.forEach((task,index)=>{

const div=document.createElement("div");
div.className="task";

const text=document.createElement("span");
text.textContent=task.title;

if(task.completed){
text.classList.add("completed");
}

text.onclick=()=>{
task.completed=!task.completed;
renderTasks();
};

const del=document.createElement("button");
del.textContent="X";

del.onclick=()=>{
tasks.splice(index,1);
renderTasks();
};

div.appendChild(text);
div.appendChild(del);

list.appendChild(div);

});

}

document.getElementById("searchTask").addEventListener("input",renderTasks);

function filterTasks(type){

currentFilter=type;

document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));

event.target.classList.add("active");

renderTasks();

}

function sortTasks(){

tasks.sort((a,b)=>a.title.localeCompare(b.title));

renderTasks();

}

/* dark / light toggle */

const toggle=document.getElementById("themeToggle");

toggle.onclick=()=>{

const body=document.body;

if(body.classList.contains("light")){
body.classList.remove("light");
body.classList.add("dark");
toggle.textContent="☀️";
}
else{
body.classList.remove("dark");
body.classList.add("light");
toggle.textContent="🌙";
}

};

</script>

</body>
</html>
