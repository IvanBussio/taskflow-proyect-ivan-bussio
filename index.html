<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
darkMode: "class"
}
</script>

<style>

/* AURORA BACKGROUND */

body.light{
background:linear-gradient(270deg,#74ebd5,#ACB6E5,#74ebd5);
background-size:600% 600%;
animation:bg 18s ease infinite;
}

body.dark{
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
background-size:600% 600%;
animation:bg 18s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* PRESENTACIÓN */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
z-index:100;
}

#intro h1{
font-size:48px;
color:white;
margin-bottom:20px;
}

#intro button{
background:#3b82f6;
color:white;
padding:12px 24px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

#intro button:hover{
transform:scale(1.05);
}

.completed{
text-decoration:line-through;
color:#ef4444;
}

</style>

</head>

<body class="light min-h-screen flex flex-col items-center p-10">

<!-- INTRO -->

<div id="intro">

<h1>TaskFlow</h1>

<button onclick="startApp()">Comenzar</button>

</div>

<header class="w-full max-w-xl flex justify-between mb-6">

<h1 class="text-3xl font-bold">TaskFlow</h1>

<div id="themeToggle" class="cursor-pointer text-xl">🌙</div>

</header>

<div class="w-full max-w-xl space-y-4">

<div class="bg-white/80 dark:bg-gray-800/80 p-5 rounded-xl shadow">

<h2 class="text-xl mb-3 font-semibold">Crear nueva tarea</h2>

<input
id="taskInput"
placeholder="Título de la tarea"
class="w-full border rounded p-2 mb-3"
/>

<button
id="addTaskBtn"
class="bg-blue-500 text-white px-4 py-2 rounded hover:scale-105 transition">
Añadir tarea
</button>

</div>

<div class="bg-white/80 dark:bg-gray-800/80 p-5 rounded-xl shadow">

<h2 class="text-xl mb-3 font-semibold">Tus tareas</h2>

<ul id="taskList" class="space-y-2"></ul>

</div>

</div>

<script src="script.js"></script>

<script>

/* INTRO */

function startApp(){

document.getElementById("intro").style.display="none";

}

</script>

</body>
</html>
