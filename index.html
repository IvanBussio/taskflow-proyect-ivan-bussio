<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
  min-height:100vh;
  transition:0.3s;
}

/* FONDO ANIMADO */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background: radial-gradient(circle,rgba(59,130,246,0.15),transparent);
  animation:moveBg 20s linear infinite;
  z-index:-1;
}

@keyframes moveBg{
  0%{transform:translate(0,0);}
  50%{transform:translate(-200px,-200px);}
  100%{transform:translate(0,0);}
}

/* MODO CLARO PRO */
body.light{
  background: linear-gradient(135deg,#e0f2ff,#bae6fd);
  color:#0f172a;
}

body.light .app{
  background:rgba(255,255,255,0.85);
  box-shadow:0 10px 40px rgba(0,0,0,0.1);
}

body.light input{
  background:#f1f5f9;
  color:#0f172a;
  border:1px solid #e2e8f0;
}

body.light .task{
  background:#ffffff;
  border:1px solid #e2e8f0;
}

body.light .task:hover{
  background:#f8fafc;
}

body.light .category-select{
  background:#e2e8f0;
  color:#0f172a;
}

/* LAYOUT */
.container{padding:40px;}
.app{
  max-width:1200px;
  margin:auto;
  background:rgba(30,41,59,0.6);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:40px;
}

/* HEADER */
h1{text-align:center;font-size:2.5rem;}
.subtitle{text-align:center;margin-bottom:30px;color:#94a3b8;}

/* STATS */
.stats{display:flex;gap:20px;margin-bottom:20px;}
.stat{flex:1;padding:20px;border-radius:15px;text-align:center;}
.total{background:#3b82f6;}
.done{background:#22c55e;}
.pending{background:#ec4899;}

/* INPUT */
.input-group{display:flex;gap:10px;margin-bottom:20px;}
.input-group input{
  flex:1;padding:15px;border-radius:12px;border:none;background:#334155;color:white;
}
.input-group button{
  padding:0 20px;border-radius:12px;border:none;background:#22c55e;color:white;cursor:pointer;
}

/* FILTERS */
.filters{display:flex;justify-content:space-between;margin-bottom:20px;}
.filters input{
  padding:10px;border-radius:10px;border:none;background:#334155;color:white;
}
.filters button{background:none;border:none;color:#60a5fa;cursor:pointer;}
.delete{color:#ef4444;}

/* TASK */
.task{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.task-content{
  display:flex;
  align-items:center;
  gap:10px;
  flex:1;
  cursor:pointer;
}

.task.completed span{
  text-decoration:line-through;
  opacity:0.5;
}

/* BOTÓN ELIMINAR */
.delete-btn{
  background:transparent;
  border:none;
  color:#64748b;
  cursor:pointer;
  transition:0.2s;
}

.delete-btn:hover{
  color:#ef4444;
  transform:scale(1.2);
}

/* SELECT */
.category-select{
  background:#334155;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  font-size:0.8rem;
  cursor:pointer;
}

/* BOTÓN MODO */
.mode-btn{
  position:absolute;
  top:20px;
  right:20px;
  border:none;
  background:none;
  font-size:1.2rem;
  cursor:pointer;
}

/* FOOTER */
footer{
  text-align:center;
  margin-top:20px;
  color:#94a3b8;
}

</style>
</head>

<body>

<button class="mode-btn" onclick="toggleMode()" id="modeIcon">🌙</button>

<div class="container">
<div class="app">

<h1>TaskFlow</h1>
<p class="subtitle">Organiza tu día 🚀</p>

<div class="stats">
<div class="stat total">TOTAL<br><span id="total">0</span></div>
<div class="stat done">COMPLETADAS<br><span id="done">0</span></div>
<div class="stat pending">PENDIENTES<br><span id="pending">0</span></div>
</div>

<div class="input-group">
<input id="taskInput" placeholder="Agregar tarea...">
<button onclick="addTask()">+</button>
</div>

<div class="filters">
<input id="search" placeholder="Buscar..." oninput="renderTasks()">
<button onclick="sortTasks()">Ordenar</button>
<button class="delete" onclick="deleteCompleted()">Eliminar completadas</button>
</div>

<div id="taskList"></div>

<footer>
© 2026 TaskFlow · Project developed by Ivan Bussio (FCT) — Corner Studios
</footer>

</div>
</div>

<script>

// ESTADO
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

// IA
function getCategory(text){
text=text.toLowerCase();
if(text.includes("comprar"))return "🛒 Compras";
if(text.includes("estudiar"))return "📚 Estudio";
if(text.includes("trabajo"))return "💼 Trabajo";
if(text.includes("gym")||text.includes("entreno"))return "🏋️ Fitness";
return "📌 General";
}

// ADD
function addTask(){
const input=taskInput;
if(!input.value.trim())return;

tasks.push({
text:input.value,
completed:false,
category:getCategory(input.value)
});

input.value="";
save();
}

// RENDER
function renderTasks(){
const list=document.getElementById("taskList");
const search=document.getElementById("search").value.toLowerCase();

list.innerHTML="";

tasks.filter(t=>t.text.toLowerCase().includes(search))
.forEach((task,i)=>{

const div=document.createElement("div");
div.className="task"+(task.completed?" completed":"");

div.innerHTML=`
<div class="task-content" onclick="toggleTask(${i})">
<input type="checkbox" ${task.completed?"checked":""} onclick="event.stopPropagation(); toggleTask(${i})">
<span>${task.text}</span>

<select class="category-select"
onchange="changeCategory(${i}, this.value)"
onclick="event.stopPropagation()">

<option ${task.category==="🛒 Compras"?"selected":""}>🛒 Compras</option>
<option ${task.category==="📚 Estudio"?"selected":""}>📚 Estudio</option>
<option ${task.category==="💼 Trabajo"?"selected":""}>💼 Trabajo</option>
<option ${task.category==="🏋️ Fitness"?"selected":""}>🏋️ Fitness</option>
<option ${task.category==="📌 General"?"selected":""}>📌 General</option>

</select>
</div>

<button class="delete-btn" onclick="event.stopPropagation(); deleteTask(${i})">✖</button>
`;

list.appendChild(div);
});

updateStats();
}

// FUNCIONES
function toggleTask(i){tasks[i].completed=!tasks[i].completed;save();}
function deleteTask(i){tasks.splice(i,1);save();}
function deleteCompleted(){tasks=tasks.filter(t=>!t.completed);save();}
function sortTasks(){tasks.sort((a,b)=>a.text.localeCompare(b.text));save();}

// CATEGORÍA
function changeCategory(i,newCategory){
tasks[i].category=newCategory;
save();
}

// STATS
function updateStats(){
total.textContent=tasks.length;
done.textContent=tasks.filter(t=>t.completed).length;
pending.textContent=tasks.filter(t=>!t.completed).length;
}

// GUARDAR
function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
renderTasks();
}

// MODO
if(localStorage.getItem("mode")==="light"){
document.body.classList.add("light");
modeIcon.textContent="☀️";
}

function toggleMode(){
document.body.classList.toggle("light");
const isLight=document.body.classList.contains("light");
localStorage.setItem("mode",isLight?"light":"dark");
modeIcon.textContent=isLight?"☀️":"🌙";
}

// ENTER
taskInput.addEventListener("keypress",e=>{
if(e.key==="Enter")addTask();
});

// INIT
renderTasks();

</script>

</body>
</html>
