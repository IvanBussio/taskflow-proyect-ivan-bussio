<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

/* ✏️ FONDO */
.animated-bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
  background:linear-gradient(135deg,#dcfce7,#bbf7d0);
}

.animated-bg svg{
  width:100%;
  height:100%;
}

.animated-bg path{
  fill:none;
  stroke:rgba(0,0,0,0.25);
  stroke-width:3;
  stroke-dasharray:1200;
  stroke-dashoffset:1200;
  animation:draw 8s linear infinite;
}

@keyframes draw{
  0%{stroke-dashoffset:1200;}
  50%{stroke-dashoffset:0;}
  100%{stroke-dashoffset:-1200;}
}

/* 🌙 DARK */

/* BASE */

body{
font-family:'Poppins',sans-serif;
transition:background .6s;
}

/* MODOS */

body.light{
background:linear-gradient(120deg,#d4f5e9,#c7f9cc,#e0f7fa);
background-size:300% 300%;
animation:bgmove 20s infinite alternate;
}

body.dark{
  background:#000;
  color:white;
}

body.dark .animated-bg{
  background:#000;
}

body.dark .animated-bg path{
  stroke:rgba(255,255,255,0.15);
}

/* 📱 APP */
.app{
  padding:20px;
  max-width:500px;
  margin:auto;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.title{
  font-size:22px;
  font-weight:600;
}

.actions{
  display:flex;
  gap:10px;
}

.icon-btn{
  border:none;
  background:transparent;
  font-size:18px;
  cursor:pointer;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:14px;
  border:1px solid rgba(0,0,0,0.08);
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(8px);
}

input:focus{
  border:1px solid #22c55e;
  box-shadow:0 0 0 2px rgba(34,197,94,0.2);
@keyframes bgmove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

/* HEADER PREMIUM */

.logo{
font-size:28px;
font-weight:600;
background:linear-gradient(90deg,#6366f1,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.icon-btn{
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
background:rgba(255,255,255,0.4);
backdrop-filter:blur(10px);
transition:.25s;
cursor:pointer;
}

.icon-btn:hover{
transform:translateY(-2px) scale(1.05);
background:rgba(255,255,255,0.7);
}

.dark .icon-btn{
background:rgba(255,255,255,0.08);
}

/* CARDS */

.glass{
background:rgba(255,255,255,.35);
backdrop-filter:blur(14px);
border-radius:18px;
padding:25px;
box-shadow:0 15px 35px rgba(0,0,0,.15);
}

body.dark input{
  background:rgba(255,255,255,0.05);
  color:white;
  border:1px solid rgba(255,255,255,0.1);
}

/* CHIPS */
.chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

.chip{
  padding:8px 14px;
  border-radius:20px;
  font-size:13px;
  cursor:pointer;
  background:rgba(255,255,255,0.6);
  border:1px solid rgba(0,0,0,0.08);
  transition:all 0.2s ease;
/* BOTONES */

.btn{
padding:10px 16px;
border-radius:10px;
background:rgba(255,255,255,.4);
transition:.25s;
}

.chip.active{
  background:#22c55e;
  color:white;
  border:none;
}

body.dark .chip{
  background:rgba(255,255,255,0.08);
.btn:hover{
transform:translateY(-2px);
background:rgba(255,255,255,.7);
}

body.dark .chip.active{
  background:#22c55e;
}

/* BOTONES */
.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}
/* TAREAS */

button{
  padding:12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

.primary{background:#22c55e;color:white;}
.secondary{background:#4b5563;color:white;}

/* TAREAS */
.task{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.7);
background:rgba(255,255,255,.55);
padding:12px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.dark .task{
background:rgba(30,41,59,.7);
}

body.dark .task{
  background:rgba(255,255,255,0.05);
.completed{
text-decoration:line-through;
opacity:.6;
}

/* PROGRESS */

.progress{
height:8px;
border-radius:6px;
background:rgba(255,255,255,.4);
}

.task small{
  opacity:0.6;
.progressbar{
height:8px;
border-radius:6px;
background:#22c55e;
}

/* MODAL */
/* MODAL */

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:flex;
align-items:center;
justify-content:center;
}

.modal-content{
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(12px);
  padding:25px;
  border-radius:18px;
  width:85%;
  max-width:350px;
}

body.dark .modal-content{
  background:rgba(30,41,59,0.95);
.modal-box{
background:white;
padding:30px;
border-radius:20px;
max-width:400px;
text-align:center;
}

.dark .modal-box{
background:#1e293b;
color:white;
}
</style>
</head>

<body>
<body class="light min-h-screen flex flex-col items-center px-4 py-6">

<!-- HEADER -->

<div class="animated-bg">
<svg viewBox="0 0 800 600">
<path d="M10 100 Q 200 50 400 150 T 800 100"/>
<path d="M0 200 Q 300 100 600 250 T 800 200"/>
<path d="M50 300 Q 250 200 500 350 T 800 300"/>
<path d="M20 400 Q 200 300 400 450 T 800 400"/>
<path d="M0 500 Q 300 400 600 550 T 800 500"/>
</svg>
<header class="w-full max-w-3xl flex justify-between items-center mb-8">

<div class="flex gap-2">

<button onclick="openWelcome()" class="icon-btn">ℹ</button>

<button id="themeToggle" class="icon-btn">
<span id="themeIcon">🌙</span>
</button>

</div>

<h1 class="logo">TaskFlow</h1>

</header>

<!-- INPUT -->

<div class="glass w-full max-w-3xl mb-6">

<input id="taskInput" placeholder="Nueva tarea..." class="w-full p-2 rounded mb-3 text-black">

<div class="flex gap-2 flex-wrap">
<button onclick="addTask()" class="btn">Añadir</button>
<button onclick="completeAll()" class="btn">Completar todas</button>
<button onclick="deleteCompleted()" class="btn">Borrar completadas</button>
</div>

<div class="app">

<div class="header">
  <div class="title">TaskFlow</div>
  <div class="actions">
    <button class="icon-btn" onclick="openInfo()">ℹ️</button>
    <button class="icon-btn" onclick="toggleTheme()">🌙</button>
  </div>
</div>

<input id="search" placeholder="Buscar...">
<input id="taskInput" placeholder="Nueva tarea...">

<input id="newCategory" placeholder="Nueva categoría...">
<button onclick="addCategory()">+ Categoría</button>

<div id="categoryChips" class="chips"></div>
</div>

<!-- LIST -->

<div class="glass w-full max-w-3xl">

<input id="search" placeholder="Buscar..." class="w-full p-2 rounded mb-3 text-black">

<button onclick="sortTasks()" class="btn mb-3">Ordenar</button>

<div id="taskList"></div>

<p id="stats" class="mt-2"></p>

<div class="row">
  <button class="primary" onclick="addTask()">Añadir</button>
  <button class="secondary" onclick="sortTasks()">Ordenar</button>
<div class="progress mt-2">
<div id="progressBar" class="progressbar"></div>
</div>

</div>

<!-- MODAL INFO -->
<div class="modal" id="infoModal">
  <div class="modal-content">
    <h2>TaskFlow</h2>

    <p style="margin-top:10px;">
      Organiza tus tareas de forma simple y rápida.
    </p>

    <ul style="margin-top:15px; padding-left:18px; font-size:14px; opacity:0.8;">
      <li>✔️ Crear tareas con categorías</li>
      <li>🔎 Buscar en tiempo real</li>
      <li>🌙 Modo oscuro</li>
      <li>⚡ Interfaz rápida y minimalista</li>
    </ul>

    <p style="margin-top:15px; font-size:13px; opacity:0.6;">
      Versión inicial – mejoras en camino 🚀
    </p>

    <br>
    <button onclick="closeInfo()">Cerrar</button>
  </div>
<!-- MODAL -->

<div id="modal" class="modal hidden">
<div class="modal-box">
<h2 class="text-xl mb-2">Sobre TaskFlow</h2>
<p>App de tareas moderna con diseño premium.</p>
<button onclick="closeWelcome()" class="btn mt-4">Cerrar</button>
</div>

<script>

/* 🌙 DARK MODE */
function toggleTheme(){
  document.body.classList.toggle("dark");
}

/* INFO */
function openInfo(){
  document.getElementById("infoModal").style.display="flex";
}
function closeInfo(){
  document.getElementById("infoModal").style.display="none";
}

/* 📂 CATEGORÍAS CHIP */
let categories=["General"];
let selectedCategory="General";

function renderCategories(){
  const container=document.getElementById("categoryChips");
  container.innerHTML="";

  categories.forEach(cat=>{
    const div=document.createElement("div");
    div.className="chip "+(cat===selectedCategory?"active":"");
    div.textContent=cat;

    div.onclick=()=>{
      selectedCategory=cat;
      renderCategories();
    };

    container.appendChild(div);
  });
}

function addCategory(){
  const input=document.getElementById("newCategory");
  if(!input.value.trim())return;

  categories.push(input.value.trim());
  selectedCategory=input.value.trim();
  input.value="";
  renderCategories();
}

renderCategories();

/* 📋 TAREAS */
let tasks=[];

function addTask(){
  const input=document.getElementById("taskInput");
  if(!input.value.trim())return;

  tasks.push({
    text:input.value,
    category:selectedCategory,
    completed:false
  });

  input.value="";
  renderTasks();
}

function renderTasks(){
  const list=document.getElementById("taskList");
  const search=document.getElementById("search").value.toLowerCase();

  list.innerHTML="";

  tasks
  .filter(t=>t.text.toLowerCase().includes(search))
  .forEach((t,i)=>{
    const div=document.createElement("div");
    div.className="task";

    div.innerHTML=`
      <div>
        <span style="${t.completed?'text-decoration:line-through':''}">
          ${t.text}
        </span>
        <small>${t.category}</small>
      </div>
      <div>
        <button onclick="toggleTask(${i})">✔️</button>
        <button onclick="deleteTask(${i})">🗑️</button>
      </div>
    `;

    list.appendChild(div);
  });
}

function toggleTask(i){
  tasks[i].completed=!tasks[i].completed;
  renderTasks();
}

function deleteTask(i){
  tasks.splice(i,1);
  renderTasks();
}

function sortTasks(){
  tasks.sort((a,b)=>a.text.localeCompare(b.text));
  renderTasks();
}

document.getElementById("search").addEventListener("input",renderTasks);

document.getElementById("taskInput").addEventListener("keypress",e=>{
  if(e.key==="Enter") addTask();
});

</script>
</div>

<script src="script.js"></script>

</body>
</html>
