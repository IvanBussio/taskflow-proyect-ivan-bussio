<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

/* ✏️ FONDO */
.animated-bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
  background:linear-gradient(135deg,#dcfce7,#bbf7d0);
}

.animated-bg svg{
  width:100%;
  height:100%;
}

.animated-bg path{
  fill:none;
  stroke:rgba(0,0,0,0.25);
  stroke-width:3;
  stroke-dasharray:1200;
  stroke-dashoffset:1200;
  animation:draw 8s linear infinite;
}

@keyframes draw{
  0%{stroke-dashoffset:1200;}
  50%{stroke-dashoffset:0;}
  100%{stroke-dashoffset:-1200;}
}

/* 🌙 DARK */
body.dark{
  background:#000;
  color:white;
}

body.dark .animated-bg{
  background:#000;
}

body.dark .animated-bg path{
  stroke:rgba(255,255,255,0.15);
}

/* 📱 APP */
.app{
  padding:20px;
  max-width:500px;
  margin:auto;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.title{
  font-size:22px;
  font-weight:600;
}

.actions{
  display:flex;
  gap:10px;
}

.icon-btn{
  border:none;
  background:transparent;
  font-size:18px;
  cursor:pointer;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:14px;
  border:1px solid rgba(0,0,0,0.08);
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(8px);
}

input:focus{
  border:1px solid #22c55e;
  box-shadow:0 0 0 2px rgba(34,197,94,0.2);
}

body.dark input{
  background:rgba(255,255,255,0.05);
  color:white;
  border:1px solid rgba(255,255,255,0.1);
}

/* CHIPS */
.chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

.chip{
  padding:8px 14px;
  border-radius:20px;
  font-size:13px;
  cursor:pointer;
  background:rgba(255,255,255,0.6);
  border:1px solid rgba(0,0,0,0.08);
  transition:all 0.2s ease;
}

.chip.active{
  background:#22c55e;
  color:white;
  border:none;
}

body.dark .chip{
  background:rgba(255,255,255,0.08);
}

body.dark .chip.active{
  background:#22c55e;
}

/* BOTONES */
.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

button{
  padding:12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

.primary{background:#22c55e;color:white;}
.secondary{background:#4b5563;color:white;}

/* TAREAS */
.task{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.7);
}

body.dark .task{
  background:rgba(255,255,255,0.05);
}

.task small{
  opacity:0.6;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(12px);
  padding:25px;
  border-radius:18px;
  width:85%;
  max-width:350px;
}

body.dark .modal-content{
  background:rgba(30,41,59,0.95);
}
</style>
</head>

<body>

<div class="animated-bg">
<svg viewBox="0 0 800 600">
<path d="M10 100 Q 200 50 400 150 T 800 100"/>
<path d="M0 200 Q 300 100 600 250 T 800 200"/>
<path d="M50 300 Q 250 200 500 350 T 800 300"/>
<path d="M20 400 Q 200 300 400 450 T 800 400"/>
<path d="M0 500 Q 300 400 600 550 T 800 500"/>
</svg>
</div>

<div class="app">

<div class="header">
  <div class="title">TaskFlow</div>
  <div class="actions">
    <button class="icon-btn" onclick="openInfo()">ℹ️</button>
    <button class="icon-btn" onclick="toggleTheme()">🌙</button>
  </div>
</div>

<input id="search" placeholder="Buscar...">
<input id="taskInput" placeholder="Nueva tarea...">

<input id="newCategory" placeholder="Nueva categoría...">
<button onclick="addCategory()">+ Categoría</button>

<div id="categoryChips" class="chips"></div>

<div class="row">
  <button class="primary" onclick="addTask()">Añadir</button>
  <button class="secondary" onclick="sortTasks()">Ordenar</button>
</div>

<div id="taskList"></div>

</div>

<!-- MODAL INFO -->
<div class="modal" id="infoModal">
  <div class="modal-content">
    <h2>TaskFlow</h2>

    <p style="margin-top:10px;">
      Organiza tus tareas de forma simple y rápida.
    </p>

    <ul style="margin-top:15px; padding-left:18px; font-size:14px; opacity:0.8;">
      <li>✔️ Crear tareas con categorías</li>
      <li>🔎 Buscar en tiempo real</li>
      <li>🌙 Modo oscuro</li>
      <li>⚡ Interfaz rápida y minimalista</li>
    </ul>

    <p style="margin-top:15px; font-size:13px; opacity:0.6;">
      Versión inicial – mejoras en camino 🚀
    </p>

    <br>
    <button onclick="closeInfo()">Cerrar</button>
  </div>
</div>

<script>

/* 🌙 DARK MODE */
function toggleTheme(){
  document.body.classList.toggle("dark");
}

/* INFO */
function openInfo(){
  document.getElementById("infoModal").style.display="flex";
}
function closeInfo(){
  document.getElementById("infoModal").style.display="none";
}

/* 📂 CATEGORÍAS CHIP */
let categories=["General"];
let selectedCategory="General";

function renderCategories(){
  const container=document.getElementById("categoryChips");
  container.innerHTML="";

  categories.forEach(cat=>{
    const div=document.createElement("div");
    div.className="chip "+(cat===selectedCategory?"active":"");
    div.textContent=cat;

    div.onclick=()=>{
      selectedCategory=cat;
      renderCategories();
    };

    container.appendChild(div);
  });
}

function addCategory(){
  const input=document.getElementById("newCategory");
  if(!input.value.trim())return;

  categories.push(input.value.trim());
  selectedCategory=input.value.trim();
  input.value="";
  renderCategories();
}

renderCategories();

/* 📋 TAREAS */
let tasks=[];

function addTask(){
  const input=document.getElementById("taskInput");
  if(!input.value.trim())return;

  tasks.push({
    text:input.value,
    category:selectedCategory,
    completed:false
  });

  input.value="";
  renderTasks();
}

function renderTasks(){
  const list=document.getElementById("taskList");
  const search=document.getElementById("search").value.toLowerCase();

  list.innerHTML="";

  tasks
  .filter(t=>t.text.toLowerCase().includes(search))
  .forEach((t,i)=>{
    const div=document.createElement("div");
    div.className="task";

    div.innerHTML=`
      <div>
        <span style="${t.completed?'text-decoration:line-through':''}">
          ${t.text}
        </span>
        <small>${t.category}</small>
      </div>
      <div>
        <button onclick="toggleTask(${i})">✔️</button>
        <button onclick="deleteTask(${i})">🗑️</button>
      </div>
    `;

    list.appendChild(div);
  });
}

function toggleTask(i){
  tasks[i].completed=!tasks[i].completed;
  renderTasks();
}

function deleteTask(i){
  tasks.splice(i,1);
  renderTasks();
}

function sortTasks(){
  tasks.sort((a,b)=>a.text.localeCompare(b.text));
  renderTasks();
}

document.getElementById("search").addEventListener("input",renderTasks);

document.getElementById("taskInput").addEventListener("keypress",e=>{
  if(e.key==="Enter") addTask();
});

</script>

</body>
</html>
