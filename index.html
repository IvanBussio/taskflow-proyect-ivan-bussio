<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
/* 🌌 Fondo animado */
body{
  background:#0a0a0f;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:
    repeating-linear-gradient(
      60deg,
      rgba(124,58,237,0.08),
      rgba(124,58,237,0.08) 2px,
      transparent 2px,
      transparent 60px
    );
  animation:moveBg 25s linear infinite;
  z-index:-1;
}

@keyframes moveBg{
  from{transform:translate(0,0);}
  to{transform:translate(-300px,-300px);}
}

/* 🖥️ 4K */
.container{
  max-width:1600px;
  margin:auto;
}

/* ✨ tarjetas */
.card{
  background:rgba(30,30,40,0.6);
  backdrop-filter:blur(10px);
  border:1px solid rgba(124,58,237,0.1);
}

/* ✨ botones */
.btn{
  padding:8px 14px;
  border-radius:10px;
  background:rgba(124,58,237,0.2);
  border:1px solid rgba(124,58,237,0.4);
  transition:0.2s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 5px 15px rgba(124,58,237,0.4);
}

/* ✨ tareas */
.task{
  transition:0.2s;
}

.task:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(124,58,237,0.2);
}
</style>

</head>

<body class="text-gray-200 min-h-screen">

<header class="p-6 flex justify-between container">
<h1 class="text-3xl font-bold">TaskFlow</h1>
</header>

<main class="container p-6 grid md:grid-cols-3 gap-6">

<section class="md:col-span-2">

<label for="taskInput" class="block mb-1">Nueva tarea</label>

<div class="flex gap-2 mb-4">
<input id="taskInput" class="flex-1 p-3 rounded bg-gray-800 text-white">
<button onclick="addTask()" class="btn">+</button>
</div>

<input id="searchInput" placeholder="Buscar..." class="w-full p-2 mb-4 rounded bg-gray-800">

<div class="flex gap-2 mb-4">
<button onclick="setFilter('all')" class="btn">Todas</button>
<button onclick="setFilter('pending')" class="btn">Pendientes</button>
<button onclick="setFilter('done')" class="btn">Completadas</button>
</div>

<div class="flex gap-2 mb-4">
<button onclick="completeAll()" class="btn">Completar todo</button>
<button onclick="deleteCompleted()" class="btn">Borrar completadas</button>
</div>

<div id="taskList" class="space-y-3"></div>

</section>

<aside class="card p-4 rounded h-fit">
<h2 class="font-bold mb-2">Estadísticas</h2>
<p>Total: <span id="total">0</span></p>
<p>Completadas: <span id="done">0</span></p>
<p>Pendientes: <span id="pending">0</span></p>
</aside>

</main>

<footer class="text-center mt-10 p-4 opacity-60">
Made by Ivan — 
<a href="https://cornerestudios.com" class="text-purple-400">Corner Estudios</a>
</footer>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let filter = "all";

/* ADD */
function addTask(){
const input=document.getElementById("taskInput");
if(!input.value.trim()) return;

tasks.unshift({
id:Date.now(),
title:input.value,
completed:false
});

input.value="";
save();
}

/* TOGGLE */
function toggle(id){
tasks=tasks.map(t=>t.id===id?{...t,completed:!t.completed}:t);
save();
}

/* DELETE */
function del(id){
tasks=tasks.filter(t=>t.id!==id);
save();
}

/* EDIT */
function editTask(id){
const txt=prompt("Editar tarea:");
if(!txt) return;
tasks=tasks.map(t=>t.id===id?{...t,title:txt}:t);
save();
}

/* FILTER */
function setFilter(type){
filter=type;
render();
}

/* ACTIONS */
function completeAll(){
tasks=tasks.map(t=>({...t,completed:true}));
save();
}

function deleteCompleted(){
tasks=tasks.filter(t=>!t.completed);
save();
}

/* SAVE */
function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
render();
}

/* RENDER */
function render(){
const list=document.getElementById("taskList");
const search=document.getElementById("searchInput").value.toLowerCase();

list.innerHTML="";

let filtered=tasks.filter(t=>{
if(filter==="pending") return !t.completed;
if(filter==="done") return t.completed;
return true;
});

filtered=filtered.filter(t=>t.title.toLowerCase().includes(search));

filtered.forEach(t=>{
const div=document.createElement("div");

div.className="task card p-3 rounded flex justify-between items-center";

div.innerHTML=`
<div class="flex gap-2 items-center">
<input type="checkbox" ${t.completed?"checked":""}>
<span class="${t.completed?"line-through opacity-50":""}">
${t.title}
</span>
</div>

<div class="flex gap-2">
<button class="btn">✏️</button>
<button class="btn">✖</button>
</div>
`;

div.querySelector("input").onclick=()=>toggle(t.id);
div.querySelectorAll(".btn")[0].onclick=()=>editTask(t.id);
div.querySelectorAll(".btn")[1].onclick=()=>del(t.id);

list.appendChild(div);
});

updateStats();
}

/* STATS */
function updateStats(){
total.textContent=tasks.length;
done.textContent=tasks.filter(t=>t.completed).length;
pending.textContent=tasks.filter(t=>!t.completed).length;
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input",render);

/* ENTER */
document.getElementById("taskInput").addEventListener("keypress",e=>{
if(e.key==="Enter") addTask();
});

render();

</script>

</body>
</html>
