<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
font-family:"Inter",sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
padding:80px 20px;

background:
radial-gradient(circle at 20% 30%,#dbeafe,transparent 50%),
radial-gradient(circle at 80% 40%,#e9d5ff,transparent 50%),
#f1f5f9;
}

.card{
background:rgba(255,255,255,0.25);
backdrop-filter:blur(14px);
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.task-enter{
opacity:0;
transform:translateY(8px);
animation:fadeTask .3s ease forwards;
}

@keyframes fadeTask{
to{
opacity:1;
transform:translateY(0);
}
}

.completed{
text-decoration:line-through;
opacity:.5;
}

</style>

</head>

<body>

<div class="w-full max-w-xl space-y-6">

<h1 class="text-4xl font-semibold mb-4">
TaskFlow
</h1>

<!-- crear tarea -->

<div class="card p-6">

<label class="block mb-2">
Nueva tarea
</label>

<input
id="taskInput"
placeholder="Escribe una tarea..."
class="w-full rounded p-2 border border-slate-300 mb-3"
/>

<div class="flex gap-2 flex-wrap">

<button id="addTaskBtn" class="bg-blue-500 text-white px-4 py-2 rounded">
Añadir
</button>

<button id="completeAllBtn" class="bg-blue-400 text-white px-4 py-2 rounded">
Completar todas
</button>

<button id="clearCompletedBtn" class="bg-blue-300 text-white px-4 py-2 rounded">
Borrar completadas
</button>

</div>

</div>

<!-- lista -->

<div class="card p-6">

<div class="flex justify-between mb-3">

<input
id="searchInput"
placeholder="Buscar tarea..."
class="border border-slate-300 rounded p-2 w-2/3"
/>

<button id="sortBtn" class="bg-blue-400 text-white px-3 py-1 rounded">
Ordenar
</button>

</div>

<div class="flex gap-2 mb-3">

<button id="filterAll" class="bg-slate-300 px-3 py-1 rounded">
Todas
</button>

<button id="filterPending" class="bg-slate-300 px-3 py-1 rounded">
Pendientes
</button>

<button id="filterDone" class="bg-slate-300 px-3 py-1 rounded">
Completadas
</button>

</div>

<div id="taskStats" class="text-sm mb-2"></div>

<div class="w-full bg-slate-300 rounded h-2 mb-4">
<div id="progressBar" class="bg-blue-500 h-2 rounded" style="width:0%"></div>
</div>

<ul id="taskList" class="space-y-2"></ul>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
