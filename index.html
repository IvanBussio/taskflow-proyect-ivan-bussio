<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow Pro</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
  padding: 20px;
}

/* CONTENEDOR */
.container {
  max-width: 400px;
  margin: auto;
  background: #ffffff40;
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

/* INPUT CATEGORÍA */
.categoria-input {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.categoria-input input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #eee;
}

.categoria-input button {
  width: 45px;
  height: 45px;
  border-radius: 10px;
  border: none;
  background: #4CAF50;
  color: white;
  font-size: 20px;
  cursor: pointer;
}

/* SELECT */
select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

/* CATEGORÍAS VISUALES */
.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 15px;
}

.tag {
  background: #ff9800;
  color: white;
  padding: 6px 10px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.tag span {
  cursor: pointer;
}

/* INPUT TAREA */
input.tarea {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

/* BOTONES */
button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin: 5px 5px 5px 0;
  cursor: pointer;
}

.btn-add {
  background: #2196F3;
  color: white;
}

.btn-clear {
  background: #f44336;
  color: white;
}

/* LISTA */
.task {
  background: #ffffff80;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
}
</style>
</head>

<body>

<div class="container">

<h2>Nueva tarea</h2>

<input class="tarea" id="taskInput" placeholder="Escribe una tarea..." />

<!-- CATEGORÍA -->
<div class="categoria-input">
  <input type="text" id="newCategory" placeholder="Nueva categoría..." />
  <button id="addCategoryBtn">+</button>
</div>

<select id="categorySelect"></select>

<div class="tags" id="tags"></div>

<button class="btn-add" onclick="addTask()">Añadir</button>
<button class="btn-clear" onclick="clearTasks()">Borrar todo</button>

<hr>

<div id="taskList"></div>

</div>

<script>
let categories = JSON.parse(localStorage.getItem("categories")) || ["General"];
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

/* ===== CATEGORÍAS ===== */

function renderCategories() {
  const select = document.getElementById("categorySelect");
  const tags = document.getElementById("tags");

  select.innerHTML = "";
  tags.innerHTML = "";

  categories.forEach(cat => {
    // SELECT
    const option = document.createElement("option");
    option.value = cat;
    option.textContent = cat;
    select.appendChild(option);

    // TAG VISUAL
    const tag = document.createElement("div");
    tag.className = "tag";
    tag.innerHTML = `${cat} <span onclick="deleteCategory('${cat}')">✖</span>`;
    tags.appendChild(tag);
  });

  localStorage.setItem("categories", JSON.stringify(categories));
}

function addCategory() {
  const input = document.getElementById("newCategory");
  const value = input.value.trim();

  if (!value) return;

  if (categories.includes(value)) {
    alert("Ya existe");
    return;
  }

  categories.push(value);
  input.value = "";
  input.focus();

  renderCategories();
}

function deleteCategory(cat) {
  categories = categories.filter(c => c !== cat);
  renderCategories();
}

/* ENTER PARA CATEGORÍA */
document.getElementById("newCategory")
  .addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      addCategory();
    }
  });

/* BOTÓN + */
document.getElementById("addCategoryBtn")
  .addEventListener("click", addCategory);


/* ===== TAREAS ===== */

function addTask() {
  const input = document.getElementById("taskInput");
  const category = document.getElementById("categorySelect").value;

  if (!input.value.trim()) return;

  tasks.push({
    text: input.value,
    category: category
  });

  input.value = "";

  renderTasks();
}

function renderTasks() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach((task, index) => {
    const div = document.createElement("div");
    div.className = "task";

    div.innerHTML = `
      ${task.text} (${task.category})
      <span onclick="deleteTask(${index})">🗑</span>
    `;

    list.appendChild(div);
  });

  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function deleteTask(index) {
  tasks.splice(index, 1);
  renderTasks();
}

function clearTasks() {
  tasks = [];
  renderTasks();
}

/* INIT */
renderCategories();
renderTasks();
</script>

</body>
</html>
