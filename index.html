<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
</head>

<body class="min-h-screen flex items-center justify-center bg-green-100 dark:bg-black transition duration-300">

  <!-- Botón modo oscuro -->
  <button id="darkModeBtn"
    class="absolute top-4 right-4 text-xl bg-white dark:bg-gray-800 px-3 py-2 rounded-full shadow">
    🌙
  </button>

  <!-- Container -->
  <div class="w-full max-w-xl bg-white dark:bg-gray-900 p-6 rounded-2xl shadow-xl">

    <!-- Header -->
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">
        TaskFlow
      </h1>
      <p class="text-gray-600 dark:text-gray-300">
        Gestión de tareas con estilo 🚀
      </p>
    </div>

    <!-- Input -->
    <div class="flex gap-2 mb-4">
      <input
        id="taskInput"
        type="text"
        placeholder="Agregar tarea..."
        class="flex-1 px-3 py-2 rounded-lg border outline-none 
        bg-gray-100 dark:bg-gray-800 
        text-gray-900 dark:text-white"
      />

      <button
        id="addBtn"
        class="bg-green-500 hover:bg-green-600 text-white px-4 rounded-lg">
        +
      </button>
    </div>

    <!-- Botones extra -->
    <div class="flex justify-between mb-4">
      <button id="sortBtn" class="text-sm text-blue-500">Ordenar</button>
      <button id="clearBtn" class="text-sm text-red-500">Eliminar completadas</button>
    </div>

    <!-- Lista -->
    <ul id="taskList" class="space-y-2"></ul>

  </div>

  <script src="script.js"></script>
</body>
</html>
