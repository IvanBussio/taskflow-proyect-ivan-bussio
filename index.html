<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

</head>

<body class="bg-gray-100 dark:bg-gray-900 min-h-screen transition-all duration-500 ease-in-out">

<div class="max-w-2xl mx-auto p-6">

<div class="flex justify-between items-center mb-8">

<div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow mb-6 transition-colors duration-500">  

<h1 class="text-3xl font-bold text-gray-800 dark:text-white">
TaskFlow
</h1>

<button
id="themeToggle"
class="p-2 rounded-md bg-gray-200 dark:bg-gray-700 hover:scale-110 transition"
>
🌙
</button>

</div>


<div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow mb-6">

<h2 class="text-lg font-semibold text-gray-700 dark:text-gray-200 mb-4">
Nueva tarea
</h2>

<div class="flex gap-3">

<input
id="taskInput"
type="text"
placeholder="Escribe una tarea..."
class="flex-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white transition"
/>

<button
id="addTask"
class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 focus:ring-2 focus:ring-blue-400 transition duration-200"
>
Añadir
</button>

</div>

</div>


<div id="taskList" class="space-y-4"></div>

</div>


<script>

/* DARK MODE */

const themeToggle = document.getElementById("themeToggle");

themeToggle.addEventListener("click", () => {

document.documentElement.classList.toggle("dark");

});


/* TASKFLOW */

const addBtn = document.getElementById("addTask");
const input = document.getElementById("taskInput");
const list = document.getElementById("taskList");

addBtn.addEventListener("click", () => {

const text = input.value.trim();

if (!text) return;

const task = document.createElement("div");

task.className =
task.className =
task.className =
"flex justify-between items-center bg-white dark:bg-gray-800 p-4 rounded-lg shadow hover:shadow-lg transition-all duration-500";

task.innerHTML = `
<span class="text-gray-800 dark:text-gray-200">${text}</span>
<button class="text-red-500 hover:text-red-700 transition">Eliminar</button>
`;

task.querySelector("button").addEventListener("click", () => {
task.remove();
});

list.appendChild(task);

input.value = "";

});

</script>

</body>
</html>
