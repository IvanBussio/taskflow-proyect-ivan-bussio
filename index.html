<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Inter,sans-serif;
  background:#0b1220;
  color:#e5e7eb;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

/* APP */
.app{
  background:#111827;
  border-radius:20px;
  padding:30px;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.header button{
  background:#1f2937;
  border:none;
  padding:8px 12px;
  border-radius:10px;
  color:white;
  cursor:pointer;
  transition: all 0.2s ease;
}

.header button:hover{
  background:#374151;
  transform: scale(1.15) rotate(5deg);
}

/* TITLE */
h1{text-align:center;font-size:2.5rem;}
.subtitle{text-align:center;margin-bottom:25px;color:#94a3b8;}

/* INPUT */
.input-group{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input{
  flex:1;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#1f2937;
  color:white;
  font-size:16px;
}

/* BOTÓN + */
.add-btn{
  background:#6366f1;
  border:none;
  padding:0 20px;
  border-radius:12px;
  color:white;
  cursor:pointer;
  transition: all 0.2s ease;
}

.add-btn:hover{
  background:#4f46e5;
  transform: scale(1.1);
  box-shadow:0 10px 20px rgba(99,102,241,0.4);
}

/* TASK */
.task{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#1f2937;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
  transition: all 0.2s ease;
}

.task:hover{
  transform: translateY(-2px);
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.left{
  display:flex;
  align-items:center;
  gap:12px;
}

/* SELECT */
select{
  background:#374151;
  border:none;
  border-radius:8px;
  padding:6px;
  color:white;
}

/* DELETE BOTÓN PRO */
.delete{
  background: transparent;
  border:none;
  color:#9ca3af;
  font-size:18px;
  cursor:pointer;
  width:32px;
  height:32px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: all 0.2s ease;
}

.delete:hover{
  background: rgba(239,68,68,0.2);
  color:#ef4444;
  transform: scale(1.2) rotate(90deg);
}

.delete:active{
  transform: scale(0.9);
}

/* COMPLETADO */
.completed span{
  text-decoration:line-through;
  opacity:0.5;
}

</style>
</head>

<body>

<div class="container">
<div class="app">

<div class="header">
<button onclick="toggleMode()">🌙</button>
<button onclick="alert('TaskFlow: organiza tareas con IA')">ℹ️</button>
</div>

<h1>TaskFlow</h1>
<p class="subtitle">Organiza tu día</p>

<div class="input-group">
<input id="taskInput" placeholder="Escribe algo...">
<button class="add-btn" onclick="addTask()">+</button>
</div>

<div id="taskList"></div>

</div>
</div>

<script>

/* IA */
function detectCategory(text){
text=text.toLowerCase();

if(text.includes("comprar")||text.includes("super")) return "Compras";
if(text.includes("estudiar")||text.includes("curso")) return "Estudio";
if(text.includes("gym")||text.includes("entrenar")) return "Gym";
if(text.includes("trabajo")) return "Trabajo";
if(text.includes("comer")) return "Comida";

return "General";
}

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

/* ADD */
function addTask(){
if(!taskInput.value.trim()) return;

const cat=detectCategory(taskInput.value);

tasks.push({
text:taskInput.value,
completed:false,
category:cat
});

taskInput.value="";
save();
}

/* RENDER */
function render(){
taskList.innerHTML="";

tasks.forEach((t,i)=>{
taskList.innerHTML+=`
<div class="task ${t.completed?"completed":""}">
<div class="left">

<input type="checkbox" ${t.completed?"checked":""} onclick="toggle(${i})">

<span>${t.text}</span>

<select onchange="change(${i},this.value)">
<option ${t.category==="General"?"selected":""}>General</option>
<option ${t.category==="Compras"?"selected":""}>Compras</option>
<option ${t.category==="Estudio"?"selected":""}>Estudio</option>
<option ${t.category==="Trabajo"?"selected":""}>Trabajo</option>
<option ${t.category==="Gym"?"selected":""}>Gym</option>
<option ${t.category==="Comida"?"selected":""}>Comida</option>
</select>

</div>

<button class="delete" onclick="del(${i})">✖</button>
</div>`;
});
}

/* FUNCIONES */
function toggle(i){tasks[i].completed=!tasks[i].completed;save();}
function del(i){tasks.splice(i,1);save();}
function change(i,v){tasks[i].category=v;save();}

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
render();
}

/* IA EN TIEMPO REAL */
taskInput.addEventListener("input",()=>{
const cat=detectCategory(taskInput.value);
taskInput.placeholder="→ "+cat;
});

/* MODE */
function toggleMode(){
document.body.classList.toggle("light");
}

render();

</script>

</body>
</html>
