<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>

body{
font-family:'Poppins',sans-serif;
transition:background .6s;
}

body.light{
background:linear-gradient(120deg,#ffd1dc,#f1c0e8,#e0c3fc);
background-size:300% 300%;
animation:bgmove 20s infinite alternate;
}

body.dark{
background:linear-gradient(120deg,#0f172a,#020617,#1e293b);
background-size:300% 300%;
animation:bgmove 20s infinite alternate;
color:white;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

.glass{
background:rgba(255,255,255,.35);
backdrop-filter:blur(14px);
border-radius:18px;
padding:25px;
box-shadow:0 15px 35px rgba(0,0,0,.15);
}

.dark .glass{
background:rgba(30,41,59,.7);
}

.btn{
padding:10px 16px;
border-radius:12px;
background:rgba(255,255,255,.25);
backdrop-filter:blur(10px);
transition:.2s;
font-weight:500;
}

.btn:hover{
transform:scale(1.05);
background:rgba(255,255,255,.4);
}

.dark .btn{
background:rgba(255,255,255,.1);
}

.task{
background:rgba(255,255,255,.55);
padding:14px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.dark .task{
background:rgba(30,41,59,.7);
}

.task span{
color:#111827;
}

.dark .task span{
color:white;
}

input{
color:#111827;
}

.dark input{
color:white;
background:rgba(30,41,59,.7);
}

.progress{
height:8px;
border-radius:6px;
background:rgba(255,255,255,.4);
}

.progressbar{
height:8px;
border-radius:6px;
background:#34d399;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:flex;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:40px;
border-radius:20px;
}

.dark .modal-box{
background:#1e293b;
color:white;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body class="light min-h-screen flex flex-col items-center px-4 py-6">

<header class="w-full max-w-5xl flex justify-between items-center mb-6">

<h1 class="text-3xl font-semibold">TaskFlow</h1>

<div class="flex gap-2">
<button onclick="openWelcome()" class="btn px-3 py-1 text-sm">ℹ</button>
<button id="themeToggle" class="btn px-3 py-1 text-sm">🌙</button>
</div>

</header>

<div class="glass w-full max-w-5xl mb-6">

<h2 class="text-xl mb-3">Nueva tarea</h2>

<input id="taskInput" placeholder="Escribe una tarea..." class="w-full p-2 rounded mb-3"/>

<div class="flex gap-2 mb-3">
<input id="newCategory" placeholder="Nueva categoría..." class="flex-1 p-2 rounded"/>
<button onclick="addCategory()" class="btn">+</button>
</div>

<select id="category" class="w-full p-2 rounded mb-3"></select>

<div id="categoryList" class="flex flex-wrap gap-2 mb-3"></div>

<div class="flex gap-2 flex-wrap">
<button onclick="addTask()" class="btn">Añadir</button>
<button onclick="completeAll()" class="btn">Completar todas</button>
<button onclick="deleteCompleted()" class="btn">Borrar completadas</button>
</div>

</div>

<div class="glass w-full max-w-5xl">

<input id="search" placeholder="Buscar..." class="w-full p-2 rounded mb-3"/>

<select id="categoryFilter" class="p-2 rounded mb-3"></select>

<p id="stats" class="text-sm mb-2"></p>

<div class="progress mb-4">
<div id="progressBar" class="progressbar"></div>
</div>

<div id="taskList"></div>

</div>

<script src="script.js"></script>

</body>
</html>
