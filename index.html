<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskflow</title>

<style>

:root {
--bg-color: #f1f5f9;
--primary: #1e3a8a;
--primary-light: #3b82f6;
--card: #ffffff;
--text: #0f172a;
--muted: #64748b;
--high: #ef4444;
--medium: #f59e0b;
--low: #10b981;
--spacing: 20px;
--radius: 14px;
--font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:var(--font);
}

body{
display:flex;
min-height:100vh;
background:var(--bg-color);
color:var(--text);
}

aside{
width:260px;
background:linear-gradient(180deg,var(--primary),var(--primary-light));
color:white;
padding:var(--spacing);
}

aside h2{
margin-bottom:20px;
}

aside p{
margin-bottom:10px;
cursor:pointer;
}

main{
flex:1;
padding:40px;
}

header{
margin-bottom:20px;
}

#task-form{
margin-bottom:20px;
display:flex;
gap:10px;
}

#task-input{
padding:10px;
flex:1;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 14px;
border:none;
border-radius:6px;
background:var(--primary);
color:white;
cursor:pointer;
}

button:hover{
background:var(--primary-light);
}

#search{
margin-bottom:20px;
padding:10px;
width:100%;
border-radius:6px;
border:1px solid #ccc;
}

#task-list{
list-style:none;
display:flex;
flex-direction:column;
gap:12px;
}

#task-list li{
background:var(--card);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-radius:var(--radius);
border:1px solid #e2e8f0;
transition:0.2s;
}

#task-list li:hover{
transform:translateY(-3px);
box-shadow:0 6px 14px rgba(0,0,0,0.1);
}

@media(max-width:768px){

body{
flex-direction:column;
}

aside{
width:100%;
text-align:center;
}

main{
padding:20px;
}

}

</style>
</head>

<body>

<aside>
<h2>Categorías</h2>
<p>Trabajo</p>
<p>Personal</p>
<p>Urgente</p>
</aside>

<main>

<header>
<h1>Lista de Tareas (<span id="task-count">0</span>)</h1>
</header>

<form id="task-form">
<input type="text" id="task-input" placeholder="Escribe una tarea..." required>
<button type="submit">Añadir</button>
</form>

<input type="text" id="search" placeholder="Buscar tarea...">

<ul id="task-list"></ul>

</main>

<script src="js/app.js"></script>

</body>
</html>
