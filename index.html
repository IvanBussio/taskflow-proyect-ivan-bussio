<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
button{all:unset;cursor:pointer;}

:root{
  --violet:#7c3aed;
}

/* 🌌 FONDO ANIMADO MEJORADO */
body{
  font-family:Inter,sans-serif;
  min-height:100vh;
  transition:0.3s;
}

/* DARK */
body.dark{
  background:#0a0a0f;
  color:#e5e7eb;
}

/* LIGHT */
body.light{
  background:#f8fafc;
  color:#0f172a;
}

/* fondo dinámico */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 20% 20%, rgba(124,58,237,0.2), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(124,58,237,0.2), transparent 40%);
  animation:moveBg 20s linear infinite;
  z-index:-1;
}

@keyframes moveBg{
  0%{transform:translate(0,0);}
  50%{transform:translate(-200px,-200px);}
  100%{transform:translate(0,0);}
}

/* 🖥️ 4K FULL */
.app{
  width:100%;
  max-width:1800px;
  min-height:100vh;
  margin:auto;
  padding:40px;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* TÍTULO PRO */
h1{
  font-size:2.8rem;
  border-bottom:3px solid var(--violet);
  display:inline-block;
  padding-bottom:5px;
}

/* BOTONES */
.btn{
  padding:10px 14px;
  border-radius:12px;
  background:rgba(124,58,237,0.2);
  border:1px solid rgba(124,58,237,0.4);
  transition:0.2s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 5px 15px rgba(124,58,237,0.4);
}

/* INPUT */
input{
  padding:14px;
  border-radius:12px;
  border:none;
  width:100%;
  background:rgba(20,20,30,0.6);
  color:inherit;
}

/* TASK */
.task{
  margin-top:10px;
  padding:14px;
  border-radius:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(20,20,30,0.6);
  transition:0.2s;
}

.task:hover{
  transform:translateY(-2px);
}

/* COMPLETADO */
.completed span{
  text-decoration:line-through;
  color:#22c55e;
}

/* FOOTER */
.footer{
  margin-top:auto;
  text-align:center;
  opacity:0.6;
}
</style>
</head>

<body class="dark">

<div class="app">

<div class="header">
<h1>TaskFlow</h1>

<div style="display:flex; gap:10px;">
<button class="btn" onclick="toggleMode()">🌙/☀️</button>
<button class="btn" onclick="sortTasks()">A-Z</button>
</div>
</div>

<div style="margin:20px 0;">
<input id="taskInput" placeholder="Añadir tarea...">
<button class="btn" onclick="addTask()">+</button>
</div>

<div style="display:flex; gap:10px; margin-bottom:20px;">
<button class="btn" onclick="selectAll()">Seleccionar todas</button>
<button class="btn" onclick="deleteCompleted()">Borrar completadas</button>
<button class="btn" onclick="deleteAll()">Borrar todo</button>
</div>

<div id="taskList"></div>

<footer class="footer">
  Designed & Built by Ivan
</footer>

</div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

/* ADD */
function addTask(){
if(!taskInput.value.trim()) return;

tasks.unshift({
id:Date.now(),
text:taskInput.value,
completed:false
});

taskInput.value="";
save();
}

/* TOGGLE */
function toggle(id){
tasks=tasks.map(t=>t.id===id?{...t,completed:!t.completed}:t);
save();
}

/* DELETE */
function del(id){
tasks=tasks.filter(t=>t.id!==id);
save();
}

/* DELETE ALL */
function deleteAll(){
if(confirm("¿Borrar todo?")){
tasks=[];
save();
}
}

/* SELECT ALL */
function selectAll(){
tasks=tasks.map(t=>({...t,completed:true}));
save();
}

/* DELETE COMPLETED */
function deleteCompleted(){
tasks=tasks.filter(t=>!t.completed);
save();
}

/* SORT */
function sortTasks(){
tasks.sort((a,b)=>a.text.localeCompare(b.text));
save();
}

/* MODE */
function toggleMode(){
document.body.classList.toggle("light");
document.body.classList.toggle("dark");
}

/* SAVE */
function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
render();
}

/* RENDER */
function render(){
taskList.innerHTML="";

tasks.forEach(t=>{
const div=document.createElement("div");

div.className=`task ${t.completed?"completed":""}`;

div.innerHTML=`
<div>
<input type="checkbox" ${t.completed?"checked":""}>
<span>${t.text}</span>
</div>
<button onclick="del(${t.id})">✖</button>
`;

div.querySelector("input").onclick=()=>toggle(t.id);

taskList.appendChild(div);
});
}

render();

</script>

</body>
</html>
