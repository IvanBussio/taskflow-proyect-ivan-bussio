<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
font-family:'Poppins',sans-serif;
transition:background .6s;
}

body.light{
background:linear-gradient(120deg,#a8e6cf,#dcedc1,#ffd3b6);
background-size:300% 300%;
animation:bgmove 20s infinite alternate;
}

body.dark{
background:linear-gradient(120deg,#020617,#0f172a,#1e293b);
background-size:300% 300%;
animation:bgmove 20s infinite alternate;
color:white;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

.glass{
background:rgba(255,255,255,.35);
backdrop-filter:blur(14px);
border-radius:20px;
padding:30px;
box-shadow:0 20px 40px rgba(0,0,0,.15);
}

.dark .glass{
background:rgba(30,41,59,.7);
}

.btn{
padding:10px 18px;
border-radius:12px;
background:rgba(255,255,255,.4);
transition:.25s;
}

.btn:hover{
transform:translateY(-3px);
background:rgba(255,255,255,.65);
}

.dark .btn{
background:rgba(255,255,255,.1);
}

.task{
background:rgba(255,255,255,.55);
padding:16px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
cursor:grab;
}

.dark .task{
background:rgba(30,41,59,.7);
}

.chip{
background:#34d399;
color:white;
padding:4px 10px;
border-radius:20px;
font-size:12px;
margin-left:6px;
}

.progress{
height:10px;
border-radius:6px;
background:rgba(255,255,255,.4);
}

.progressbar{
height:10px;
border-radius:6px;
background:#34d399;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:flex;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:40px;
border-radius:20px;
max-width:500px;
text-align:center;
}

.dark .modal-box{
background:#1e293b;
color:white;
}

</style>
</head>

<body class="light min-h-screen px-8 py-6">

<header class="w-full flex justify-between items-center mb-10">

<div class="flex gap-3">
<button onclick="openWelcome()" class="btn">ℹ</button>
<button id="themeToggle" class="btn">🌙</button>
</div>

<h1 class="text-5xl font-semibold">TaskFlow</h1>

</header>

<div class="w-full max-w-7xl mx-auto">

<div class="glass mb-6">

<h2 class="text-2xl mb-4">Nueva tarea</h2>

<input id="taskInput" placeholder="Tarea..." class="w-full p-3 rounded mb-3 text-black"/>
<input id="categoryInput" placeholder="Categoría..." class="w-full p-3 rounded mb-4 text-black"/>

<div class="flex gap-3 flex-wrap">
<button onclick="addTask()" class="btn">Añadir</button>
<button onclick="completeAll()" class="btn">Completar todas</button>
<button onclick="deleteCompleted()" class="btn">Borrar completadas</button>
</div>

</div>

<div class="glass">

<div class="flex gap-3 mb-4">
<input id="search" placeholder="Buscar..." class="flex-1 p-3 rounded text-black"/>
<button onclick="sortTasks()" class="btn">Ordenar</button>
</div>

<p id="stats" class="text-sm mb-3"></p>

<div class="progress mb-4">
<div id="progressBar" class="progressbar"></div>
</div>

<div id="taskList"></div>

</div>

</div>

<div id="welcomeModal" class="modal hidden">
<div class="modal-box">
<h2 class="text-3xl mb-4">TaskFlow PRO</h2>
<p>Organiza tareas con drag & drop, categorías y guardado automático.</p>
<button onclick="closeWelcome()" class="btn mt-6">Cerrar</button>
</div>
</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || []
let dragIndex = null

function save(){
localStorage.setItem("tasks", JSON.stringify(tasks))
}

function addTask(){
const text = taskInput.value
const category = categoryInput.value

if(!text) return

tasks.push({text,category,done:false})
taskInput.value=""
categoryInput.value=""
save()
render()
}

function render(){
const list = document.getElementById("taskList")
list.innerHTML=""

const searchValue = document.getElementById("search").value.toLowerCase()

let completed=0

tasks.forEach((t,i)=>{
if(!t.text.toLowerCase().includes(searchValue)) return

if(t.done) completed++

const div=document.createElement("div")
div.className="task"
div.draggable=true

div.ondragstart=()=>dragIndex=i
div.ondragover=(e)=>e.preventDefault()
div.ondrop=()=>{
const moved = tasks.splice(dragIndex,1)[0]
tasks.splice(i,0,moved)
save()
render()
}

div.innerHTML=`
<span style="${t.done?'text-decoration:line-through':''}">
${t.text}
${t.category?`<span class="chip">${t.category}</span>`:""}
</span>

<div>
<button onclick="toggle(${i})">✔</button>
<button onclick="removeTask(${i})">❌</button>
</div>
`

list.appendChild(div)
})

document.getElementById("stats").innerText=`${completed}/${tasks.length} completadas`
document.getElementById("progressBar").style.width = tasks.length ? (completed/tasks.length*100)+"%" : "0%"
}

function toggle(i){
tasks[i].done=!tasks[i].done
save()
render()
}

function removeTask(i){
tasks.splice(i,1)
save()
render()
}

function completeAll(){
tasks.forEach(t=>t.done=true)
save()
render()
}

function deleteCompleted(){
tasks=tasks.filter(t=>!t.done)
save()
render()
}

function sortTasks(){
tasks.sort((a,b)=>a.text.localeCompare(b.text))
save()
render()
}

document.getElementById("themeToggle").onclick=()=>{
document.body.classList.toggle("dark")
document.body.classList.toggle("light")
}

function openWelcome(){
document.getElementById("welcomeModal").classList.remove("hidden")
}

function closeWelcome(){
document.getElementById("welcomeModal").classList.add("hidden")
}

document.getElementById("search").addEventListener("input", render)

render()

</script>

</body>
</html>
