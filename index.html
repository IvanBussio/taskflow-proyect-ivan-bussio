<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
button{all:unset;cursor:pointer;}

:root{--violet:#7c3aed;}

body{
  font-family:Inter,sans-serif;
  min-height:100vh;
  transition:0.3s;
}

/* DARK / LIGHT */
body.dark{background:#0a0a0f;color:#e5e7eb;}
body.light{background:linear-gradient(135deg,#f5f3ff,#eef2ff);color:#1e293b;}

/* fondo animado */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 20% 20%, rgba(124,58,237,0.2), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(124,58,237,0.2), transparent 40%);
  animation:moveBg 20s linear infinite;
  z-index:-1;
}
@keyframes moveBg{
  0%{transform:translate(0,0);}
  50%{transform:translate(-200px,-200px);}
  100%{transform:translate(0,0);}
}

/* layout */
.app{
  max-width:1800px;
  margin:auto;
  padding:40px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* header */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h1{
  font-size:2.8rem;
  border-bottom:3px solid var(--violet);
}

/* botones */
.btn{
  padding:10px 14px;
  border-radius:12px;
  background:rgba(124,58,237,0.2);
  border:1px solid rgba(124,58,237,0.4);
  transition:0.2s;
}
.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 5px 15px rgba(124,58,237,0.4);
}

/* input */
.input-group{
  display:flex;
  gap:10px;
  margin:20px 0;
}
input{
  flex:1;
  padding:14px;
  border-radius:12px;
  border:none;
  background:rgba(20,20,30,0.6);
  color:inherit;
}
body.light input{
  background:white;
}

/* tareas */
.task{
  margin-top:10px;
  padding:14px;
  border-radius:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(20,20,30,0.6);
}

body.light .task{
  background:rgba(255,255,255,0.7);
}

.completed span{
  text-decoration:line-through;
  color:#22c55e;
}

/* badge */
.badge{
  margin-left:10px;
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
  background:rgba(124,58,237,0.2);
}

/* checkbox */
.checkbox{
  position:relative;
  width:20px;height:20px;
}
.checkbox input{opacity:0;}
.checkmark{
  position:absolute;
  width:20px;height:20px;
  border-radius:6px;
  border:2px solid #7c3aed;
}
.checkbox input:checked + .checkmark{background:#7c3aed;}
.checkmark::after{
  content:"";
  position:absolute;
  display:none;
}
.checkbox input:checked + .checkmark::after{display:block;}
.checkmark::after{
  left:6px;top:2px;width:5px;height:10px;
  border:solid white;border-width:0 2px 2px 0;
  transform:rotate(45deg);
}

/* bienvenida */
.welcome{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:var(--violet);
  padding:12px 20px;
  border-radius:20px;
  color:white;
  z-index:10;
  animation:fadeOut 3s forwards;
}
@keyframes fadeOut{
  0%{opacity:1;}
  80%{opacity:1;}
  100%{opacity:0;}
}

.footer{
  margin-top:auto;
  text-align:center;
  opacity:0.6;
}
</style>
</head>

<body class="dark">

<div class="welcome">Bienvenido a TaskFlow 🚀</div>

<div class="app">

<div class="header">
<h1>TaskFlow</h1>

<div style="display:flex; gap:10px;">
<button class="btn" onclick="toggleMode()" id="modeBtn">🌙</button>
<button class="btn" onclick="showInfo()">ℹ️</button>
</div>
</div>

<div class="input-group">
<input id="taskInput" placeholder="Añadir tarea...">
<button class="btn" onclick="addTask()">+</button>
</div>

<div style="display:flex; gap:10px; margin-bottom:20px;">
<button class="btn" onclick="selectAll()">Seleccionar todas</button>
<button class="btn" onclick="deleteCompleted()">Borrar completadas</button>
<button class="btn" onclick="sortTasks()">Ordenar</button>
<button class="btn" onclick="deleteAll()">Borrar todo</button>
</div>

<div id="taskList"></div>

<footer class="footer">
  Designed & Built by Ivan
</footer>

</div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

/* IA CATEGORÍAS */
function detectCategory(text){
text=text.toLowerCase();

if(text.includes("comprar")||text.includes("super")) return "Compras";
if(text.includes("estudiar")||text.includes("curso")) return "Estudio";
if(text.includes("gym")||text.includes("entrenar")) return "Fitness";
if(text.includes("trabajo")||text.includes("reunion")) return "Trabajo";
if(text.includes("comer")||text.includes("cena")) return "Comida";
if(text.includes("viaje")||text.includes("hotel")) return "Viaje";

return "General";
}

/* ADD */
function addTask(){
if(!taskInput.value.trim()) return;

tasks.unshift({
id:Date.now(),
text:taskInput.value,
completed:false,
category:detectCategory(taskInput.value)
});

taskInput.value="";
save();
}

/* ENTER */
taskInput.addEventListener("keypress",e=>{
if(e.key==="Enter") addTask();
});

/* TOGGLE */
function toggle(id){
tasks=tasks.map(t=>t.id===id?{...t,completed:!t.completed}:t);
save();
}

/* DELETE */
function del(id){
tasks=tasks.filter(t=>t.id!==id);
save();
}

/* ACTIONS */
function deleteAll(){tasks=[];save();}
function selectAll(){tasks=tasks.map(t=>({...t,completed:true}));save();}
function deleteCompleted(){tasks=tasks.filter(t=>!t.completed);save();}
function sortTasks(){tasks.sort((a,b)=>a.text.localeCompare(b.text));save();}

/* MODE */
function toggleMode(){
document.body.classList.toggle("light");
document.body.classList.toggle("dark");
modeBtn.textContent = document.body.classList.contains("light") ? "☀️" : "🌙";
}

/* INFO */
function showInfo(){
alert("TaskFlow\n\nOrganiza tu día de forma simple.\n\nDesarrollado por Ivan");
}

/* SAVE */
function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
render();
}

/* RENDER */
function render(){
taskList.innerHTML="";

tasks.forEach(t=>{
const div=document.createElement("div");

div.className=`task ${t.completed?"completed":""}`;

div.innerHTML=`
<div style="display:flex; align-items:center; gap:10px;">
<label class="checkbox">
<input type="checkbox" ${t.completed?"checked":""}>
<span class="checkmark"></span>
</label>

<span>${t.text}</span>
<span class="badge">${t.category}</span>
</div>

<button onclick="del(${t.id})">✖</button>
`;

div.querySelector("input").onclick=()=>toggle(t.id);

taskList.appendChild(div);
});
}

render();

</script>

</body>
</html>
