<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
button{all:unset;cursor:pointer;}

:root{
  --violet:#7c3aed;
  --violet-dark:#6d28d9;
}

/* DARK */
body{
  font-family:Inter,sans-serif;
  background:#0a0a0f;
  color:#e5e7eb;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

/* LIGHT */
body.light{
  background:#f8fafc;
  color:#0f172a;
}

/* APP */
.app{
  width:95%;
  max-width:1600px;
  margin:auto;
  background:rgba(17,24,39,0.7);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

body.light .app{
  background:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.header button{
  background:#1f2937;
  padding:8px 12px;
  border-radius:10px;
  transition:0.2s;
}

body.light .header button{
  background:#e2e8f0;
}

.header button:hover{
  transform:scale(1.15);
}

/* TITLE */
h1{text-align:center;font-size:2.5rem;}
.subtitle{text-align:center;margin-bottom:20px;color:#94a3b8;}

/* STATS */
.stats{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
  background:#1f2937;
  padding:10px;
  border-radius:10px;
}

body.light .stats{
  background:#e2e8f0;
}

/* INPUT */
.input-group{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input{
  flex:1;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#1f2937;
  color:white;
}

body.light input{
  background:#f1f5f9;
  color:#0f172a;
}

input:focus{
  outline:none;
  box-shadow:0 0 10px var(--violet);
}

/* BOTÓN + */
.add-btn{
  background:var(--violet);
  padding:0 20px;
  border-radius:12px;
  color:white;
  transition:0.2s;
}

.add-btn:hover{
  background:var(--violet-dark);
  transform:scale(1.1);
  box-shadow:0 0 20px rgba(124,58,237,0.6);
}

/* TASK GRID */
#taskList{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

/* 4K */
@media (min-width:1400px){
  #taskList{
    grid-template-columns:1fr 1fr;
  }
}

@media (min-width:2000px){
  #taskList{
    grid-template-columns:1fr 1fr 1fr;
  }
}

/* TASK */
.task{
  background:#1f2937;
  padding:14px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
}

body.light .task{
  background:white;
  border:1px solid #e2e8f0;
}

.task:hover{
  transform:translateY(-3px);
  box-shadow:0 0 20px rgba(124,58,237,0.2);
}

/* LEFT */
.left{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

/* BADGE */
.badge{
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
  background:var(--violet);
  color:white;
}

/* DELETE */
.delete{
  appearance:none;
  background:transparent;
  color:#9ca3af;
  font-size:18px;
  width:32px;
  height:32px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.2s;
}

.delete:hover{
  background:rgba(239,68,68,0.2);
  color:#ef4444;
  transform:scale(1.2) rotate(90deg);
}

/* COMPLETED */
.completed span{
  text-decoration:line-through;
  opacity:0.5;
}

/* MOBILE */
@media(max-width:768px){
  .input-group{flex-direction:column;}
  .add-btn{width:100%;text-align:center;padding:12px;}
  .task{flex-direction:column;align-items:flex-start;gap:10px;}
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<button onclick="toggleMode()">🌙</button>
<button onclick="alert('TaskFlow PRO con IA')">ℹ️</button>
</div>

<h1>TaskFlow</h1>
<p class="subtitle">Organiza tu día</p>

<div class="stats">
<div>Total: <span id="total">0</span></div>
<div>✔: <span id="done">0</span></div>
<div>⏳: <span id="pending">0</span></div>
</div>

<div class="input-group">
<input id="taskInput" placeholder="Escribe algo...">
<button class="add-btn" onclick="addTask()">+</button>
</div>

<div id="taskList"></div>

</div>

<script>

/* IA */
function detectCategory(text){
text=text.toLowerCase();

if(text.includes("comprar")) return "Compras";
if(text.includes("estudiar")) return "Estudio";
if(text.includes("gym")) return "Gym";
if(text.includes("trabajo")) return "Trabajo";
if(text.includes("comer")) return "Comida";

return "General";
}

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

/* ADD */
function addTask(){
if(!taskInput.value.trim()) return;

tasks.push({
text:taskInput.value,
completed:false,
category:detectCategory(taskInput.value)
});

taskInput.value="";
save();
}

/* RENDER */
function render(){
taskList.innerHTML="";

tasks.forEach((t,i)=>{
taskList.innerHTML+=`
<div class="task ${t.completed?"completed":""}">
<div class="left">

<input type="checkbox" ${t.completed?"checked":""} onclick="toggle(${i})">

<span>${t.text}</span>

<span class="badge">${t.category}</span>

</div>

<button class="delete" onclick="del(${i})">✖</button>
</div>`;
});

updateStats();
}

/* STATS */
function updateStats(){
total.textContent=tasks.length;
done.textContent=tasks.filter(t=>t.completed).length;
pending.textContent=tasks.filter(t=>!t.completed).length;
}

/* FUNCIONES */
function toggle(i){tasks[i].completed=!tasks[i].completed;save();}
function del(i){tasks.splice(i,1);save();}

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
render();
}

/* MODE */
function toggleMode(){
document.body.classList.toggle("light");
}

/* IA realtime */
taskInput.addEventListener("input",()=>{
taskInput.placeholder="→ "+detectCategory(taskInput.value);
});

render();

</script>

</body>
</html>
