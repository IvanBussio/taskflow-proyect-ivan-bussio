<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskflow</title>

<style>

:root{
--bg-color:#0f0f0f;
--primary:#eab308;
--primary-light:#facc15;
--card:#1a1a1a;
--text:#f9fafb;
--muted:#9ca3af;
--spacing:20px;
--radius:14px;
--font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:var(--font);
}

body{
display:flex;
min-height:100vh;
background:var(--bg-color);
color:var(--text);
}

/* DARK MODE */

.dark-mode{
--bg-color:#000000;
--card:#111111;
--text:#ffffff;
}

/* SIDEBAR */

aside{
width:260px;
background:linear-gradient(180deg,var(--primary),var(--primary-light));
color:#111;
padding:var(--spacing);
}

aside h2{
margin-bottom:25px;
font-size:1.2rem;
}

aside p{
margin-bottom:12px;
cursor:pointer;
}

/* MAIN */

main{
flex:1;
padding:40px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

/* FORM */

#task-form{
display:flex;
gap:10px;
margin-bottom:15px;
}

#task-input{
padding:12px;
flex:1;
border-radius:8px;
border:1px solid #444;
background:#222;
color:white;
}

/* BOTONES ELEGANTES */

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,var(--primary),var(--primary-light));
color:#111;
cursor:pointer;
font-weight:600;
transition:all 0.25s ease;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 18px rgba(0,0,0,0.45);
}

button:active{
transform:scale(0.96);
}

/* SEARCH */

#search{
margin-bottom:20px;
padding:12px;
width:100%;
border-radius:8px;
border:1px solid #444;
background:#222;
color:white;
}

/* TASK LIST */

#task-list{
list-style:none;
display:flex;
flex-direction:column;
gap:12px;
}

#task-list li{
background:var(--card);
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
border-radius:var(--radius);
border:1px solid #333;
transition:0.2s;
}

#task-list li:hover{
transform:translateY(-3px);
box-shadow:0 6px 14px rgba(0,0,0,0.4);
}

/* BOTÓN ELIMINAR */

#task-list button{
background:#ef4444;
color:white;
}

/* RESPONSIVE */

@media(max-width:768px){

body{
flex-direction:column;
}

aside{
width:100%;
text-align:center;
}

main{
padding:20px;
}

}

</style>
</head>

<body>

<aside>
<h2>Categorías</h2>
<p>Proyecto</p>
<p>Estudio</p>
<p>Urgente</p>
</aside>

<main>

<header>

<h1>Lista de Tareas (<span id="task-count">0</span>)</h1>

<button id="dark-toggle">🌙</button>

</header>

<section>

<form id="task-form">
<input type="text" id="task-input" placeholder="Escribe una tarea..." required>
<button type="submit">Añadir</button>
</form>

<input type="text" id="search" placeholder="Buscar tarea...">

<ul id="task-list"></ul>

</section>

</main>

<script src="js/app.js"></script>

</body>
</html>
